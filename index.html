<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bouquet Studio — Handcrafted Ribbon Flowers, Sydney</title>
<meta name="description" content="Curated ribbon flower bouquets handcrafted in Sydney. Same-day delivery across Australia. Shop bridal, birthday, anniversary and custom bouquets."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
/* ── DESIGN TOKENS ── */
:root{
  --cream:#faf6f0; --cream2:#f2ece2;
  --dark:#1a2b1c;  --dark2:#111a12;
  --gold:#c4973a;  --gold-light:#e8d5a3;
  --blush:#deb8b0; --blush-light:#f5e8e4;
  --text:#2c2c2a;  --muted:#7a7060;
  --border:rgba(196,151,58,.18);
  --border-neutral:rgba(44,44,42,.1);
  --sh-sm:0 1px 4px rgba(0,0,0,.05);
  --sh-md:0 4px 16px rgba(0,0,0,.07);
  --sh-lg:0 8px 32px rgba(0,0,0,.1);
  --px:64px; --py:88px; --nav-h:72px;
  --r-sm:10px; --r-md:16px; --r-lg:20px; --pill:100px;
  --ease-expo:cubic-bezier(.16,1,.3,1);
  /* Consistent spacing scale */
  --sp-1:8px; --sp-2:16px; --sp-3:24px; --sp-4:32px;
  --sp-5:40px; --sp-6:48px; --sp-8:64px;
}
@media(max-width:1024px){:root{--px:40px;--py:72px}}
@media(max-width:767px) {:root{--px:20px;--py:56px;--nav-h:60px}}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
img{display:block;max-width:100%}
button{font-family:inherit}
ul{list-style:none}
a{text-decoration:none}
/* Removed: cursor:none — custom cursor deleted */
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden}

/* Subtle grain texture — kept but reduced opacity */
.grain{position:fixed;inset:0;pointer-events:none;z-index:9000;opacity:.022;
  background-size:200px 200px;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* ── TOAST ── */
#toast-root{position:fixed;bottom:24px;right:24px;z-index:8000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--dark);color:var(--cream);padding:11px 18px;border-radius:var(--pill);
  font-size:12.5px;font-weight:500;letter-spacing:.03em;
  display:flex;align-items:center;gap:9px;
  box-shadow:var(--sh-lg);pointer-events:none;
  transform:translateY(12px);opacity:0}
.toast-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0}

/* ── NAV ── */
.nav{position:fixed;inset:0 0 auto 0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  height:var(--nav-h);padding:0 var(--px);
  transition:background .3s,border-color .3s}
.nav.scrolled{background:rgba(250,246,240,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--border-neutral)}
.nav.nav-light .nav-logo{color:var(--cream)}
.nav.nav-light .nav-logo span{color:var(--gold)}
.nav.nav-light .nav-links a{color:rgba(250,246,240,.65)}
.nav.nav-light .nav-links a:hover,.nav.nav-light .nav-links a.active{color:var(--gold);opacity:1}
.nav.nav-light .hamburger span{background:var(--cream)}
.nav.nav-light .nav-cart-btn{color:var(--cream);opacity:.75}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;letter-spacing:.07em;color:var(--dark);cursor:pointer}
.nav-logo span{color:var(--gold)}
.nav-links{display:flex;gap:28px}
.nav-links a{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text);opacity:.55;transition:opacity .2s,color .2s;cursor:pointer}
.nav-links a:hover,.nav-links a.active{opacity:1;color:var(--gold)}
.nav-actions{display:flex;gap:10px;align-items:center}
.nav-cart-btn{background:none;border:none;cursor:pointer;font-size:11px;font-weight:500;letter-spacing:.07em;color:var(--text);opacity:.55;transition:opacity .2s;display:flex;align-items:center;gap:5px}
.nav-cart-btn:hover{opacity:1}
.cart-count{background:var(--gold);color:white;width:17px;height:17px;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px}
.hamburger span{display:block;width:21px;height:1.5px;background:var(--dark);border-radius:2px;transition:transform .25s,opacity .25s}
.mob-menu{position:fixed;inset:0;z-index:300;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transform:translateX(100%);visibility:hidden}
.mob-close{position:absolute;top:18px;right:var(--px);background:none;border:none;cursor:pointer;font-size:26px;color:rgba(250,246,240,.4);line-height:1}
.mob-links{display:flex;flex-direction:column;align-items:center;gap:2px}
.mob-links a{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;font-style:italic;color:rgba(250,246,240,.7);transition:color .2s;cursor:pointer;padding:6px 0}
.mob-links a:hover{color:var(--gold)}
.mob-cta{margin-top:24px}
@media(max-width:767px){.nav-links,.cart-label{display:none}.hamburger{display:flex}}
/* Removed: .btn-nav from nav — replaced with plain link */
.nav-login-link{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text);opacity:.55;transition:opacity .2s,color .2s;cursor:pointer;background:none;border:none;padding:0}
.nav-login-link:hover{opacity:1;color:var(--gold)}

/* ── HERO ── */
.hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;
  padding:calc(var(--nav-h) + 40px) var(--px) 64px;position:relative;overflow:hidden;gap:40px}
/* Removed: .hero-orb decorative blob — replaced with restrained bg */
.hero-left{position:relative;z-index:2;max-width:520px}
.hero-eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:10px;font-weight:600;
  letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:20px}
.hero-eyebrow::before{content:'';width:28px;height:1px;background:var(--gold)}
/* Removed: .line / .line-inner clip animation wrappers */
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,4.8vw,68px);
  font-weight:300;line-height:1.08;color:var(--dark);margin-bottom:20px}
.hero-title em{font-style:italic;color:var(--gold)}
.hero-desc{font-size:14px;font-weight:300;color:var(--muted);line-height:1.8;max-width:380px;margin-bottom:32px}
.hero-cta{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.hero-stats{display:flex;gap:28px;margin-top:40px;padding-top:28px;border-top:1px solid var(--border)}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;color:var(--dark);line-height:1}
.stat-lbl{font-size:10px;color:var(--muted);letter-spacing:.09em;text-transform:uppercase;margin-top:3px}
.hero-right{position:relative;z-index:2;display:flex;align-items:center;justify-content:center}
.hero-img-wrap{position:relative}
.hero-img-frame{width:400px;height:500px;border-radius:var(--r-lg);overflow:hidden;position:relative;flex-shrink:0}
.hero-img-frame img{width:100%;height:100%;object-fit:cover;object-position:center top}
/* Kept: small floating info badges — but removed petal emojis */
.hero-badge{position:absolute;top:24px;left:-16px;background:white;border-radius:var(--r-sm);
  padding:12px 16px;box-shadow:var(--sh-md);z-index:4}
.hero-badge-label{font-size:9px;font-weight:700;letter-spacing:.14em;color:var(--gold);text-transform:uppercase}
.hero-badge-sub{font-size:11.5px;color:var(--text);margin-top:2px}
.hero-float-pill{position:absolute;bottom:36px;right:-12px;background:var(--dark);color:var(--cream);
  border-radius:var(--pill);padding:9px 16px;z-index:4;box-shadow:var(--sh-md);
  font-size:11px;font-weight:500;letter-spacing:.04em;white-space:nowrap}
.hero-float-pill span{color:var(--gold)}
/* Removed: .hero-petal floating emoji elements */
@media(max-width:1024px){.hero-img-frame{width:320px;height:420px}}
@media(max-width:767px){
  .hero{grid-template-columns:1fr;min-height:auto;padding-bottom:48px}
  .hero-right{margin-top:32px}
  .hero-img-frame{width:100%;max-width:280px;height:340px;margin:0 auto}
  .hero-badge{top:12px;left:0}
  .hero-float-pill{bottom:12px;right:0}
  .hero-stats{gap:18px}
}

/* ── TRUST BAR (replaces animated marquee/ribbon) ── */
.trust-bar{background:var(--dark);padding:14px var(--px);display:flex;align-items:center;justify-content:center;
  gap:32px;flex-wrap:wrap;border-top:1px solid rgba(196,151,58,.12);border-bottom:1px solid rgba(196,151,58,.12)}
.trust-item{display:flex;align-items:center;gap:8px;font-size:11.5px;font-weight:400;
  font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--gold-light);letter-spacing:.04em}
.trust-icon{font-size:14px;line-height:1}
@media(max-width:600px){.trust-bar{gap:16px;padding:12px var(--px)}.trust-item{font-size:11px}}

/* ── FEATURES STRIP ── */
.features{background:var(--cream2);display:grid;grid-template-columns:repeat(3,1fr);
  border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.feat-item{padding:32px var(--px);display:flex;align-items:flex-start;gap:14px;border-right:1px solid var(--border)}
.feat-item:last-child{border-right:none}
.feat-icon{font-size:18px;width:40px;height:40px;background:white;border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;box-shadow:var(--sh-sm);flex-shrink:0}
.feat-title{font-size:13px;font-weight:600;color:var(--dark);margin-bottom:4px}
.feat-desc{font-size:12px;font-weight:300;color:var(--muted);line-height:1.65}
@media(max-width:1024px){
  .features{grid-template-columns:1fr}
  .feat-item{border-right:none;border-bottom:1px solid var(--border);padding:24px var(--px)}
  .feat-item:last-child{border-bottom:none}
}

/* ── SHARED SECTION ── */
.section{padding:var(--py) var(--px)}
.eyebrow{display:flex;align-items:center;gap:10px;font-size:10px;font-weight:600;
  letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.eyebrow::before{content:'';width:22px;height:1px;background:var(--gold)}
.eyebrow.light{color:var(--gold-light)}
.eyebrow.light::before{background:var(--gold-light)}
.eyebrow.center{justify-content:center}
.eyebrow.center::before{display:none}
/* Reduced heading sizes — less cinematic */
.sec-title{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,3.2vw,44px);
  font-weight:300;line-height:1.12;color:var(--dark)}
.sec-title em{font-style:italic;color:var(--gold)}
.sec-title.light{color:var(--cream)}

/* ── PRODUCT CARD COMPONENT (reusable) ── */
.coll-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:40px}
.coll-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}

/* ProductCard */
.card{background:white;border-radius:var(--r-lg);overflow:hidden;position:relative;
  box-shadow:var(--sh-sm);transition:box-shadow .25s,transform .25s;cursor:pointer}
.card:hover{box-shadow:var(--sh-md);transform:translateY(-3px)}
.card-shell{overflow:hidden;position:relative}
.card-img{width:100%;height:248px;object-fit:cover;transition:transform .4s ease}
.card:hover .card-img{transform:scale(1.04)}
/* Wishlist button on card — real ecommerce UX */
.card-wish{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:50%;
  background:white;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:13px;box-shadow:var(--sh-sm);transition:background .2s,transform .15s;z-index:2;opacity:0}
.card:hover .card-wish{opacity:1}
.card-wish:hover{background:var(--blush-light);transform:scale(1.12)}
.card-wish.active{opacity:1;background:var(--blush-light)}
.card-body{padding:16px 18px 20px}
.card-tag{font-size:9px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.card-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;color:var(--dark);margin-bottom:5px}
.card-desc{font-size:11.5px;color:var(--muted);line-height:1.6;margin-bottom:12px}
.card-foot{display:flex;justify-content:space-between;align-items:center}
.card-price{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:var(--dark)}
.card-bdg{position:absolute;top:10px;left:10px;background:var(--dark);color:var(--cream);
  font-size:8.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  padding:3px 9px;border-radius:var(--pill)}
.card-bdg.gold{background:var(--gold);color:var(--dark)}
@media(max-width:1024px){.coll-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:767px){.coll-grid{grid-template-columns:1fr}.coll-head{flex-direction:column;align-items:flex-start;gap:14px}}

/* ── QUICK VIEW MODAL ── */
.qv-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:6000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s}
.qv-bg.open{opacity:1;visibility:visible}
.qv-box{background:var(--cream);border-radius:var(--r-lg);width:90%;max-width:680px;
  display:grid;grid-template-columns:1fr 1fr;overflow:hidden;
  transform:translateY(12px);transition:transform .3s var(--ease-expo);box-shadow:var(--sh-lg)}
.qv-bg.open .qv-box{transform:translateY(0)}
.qv-img{width:100%;height:360px;object-fit:cover}
.qv-info{padding:28px;display:flex;flex-direction:column;justify-content:center;gap:10px;position:relative}
.qv-close{position:absolute;top:14px;right:14px;background:none;border:none;cursor:pointer;font-size:20px;color:var(--muted);line-height:1}
.qv-tag{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--gold)}
.qv-name{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--dark)}
.qv-desc{font-size:12.5px;color:var(--muted);line-height:1.7}
.qv-price{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--dark)}
.qv-qty{display:flex;align-items:center;gap:10px}
.qv-qty-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-right:4px}
@media(max-width:600px){.qv-box{grid-template-columns:1fr}.qv-img{height:220px}}

/* ── BESPOKE SECTION ── */
.bespoke{background:var(--dark);display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:56px;padding:88px var(--px)}
.bespoke-desc{font-size:13.5px;font-weight:300;color:rgba(250,246,240,.58);line-height:1.8;margin:16px 0 28px;max-width:400px}
.bespoke-steps{display:flex;flex-direction:column;gap:14px;margin-bottom:30px}
.bespoke-step{display:flex;align-items:center;gap:12px}
.step-n{width:28px;height:28px;border-radius:50%;border:1px solid var(--gold);color:var(--gold);
  font-family:'Cormorant Garamond',serif;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-t{font-size:12.5px;color:rgba(250,246,240,.68);font-weight:300}
.bespoke-img-wrap{position:relative}
.bespoke-img{width:100%;height:460px;object-fit:cover;border-radius:var(--r-lg)}
/* Kept: one tasteful floating card */
.bespoke-float{position:absolute;bottom:-12px;left:-16px;background:var(--gold);
  border-radius:var(--r-md);padding:14px 20px;width:190px;box-shadow:var(--sh-md)}
.bespoke-float-t{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--dark);font-weight:600}
.bespoke-float-s{font-size:10.5px;color:rgba(26,43,28,.62);margin-top:2px}
@media(max-width:767px){.bespoke{grid-template-columns:1fr;gap:36px;padding:56px var(--px)}.bespoke-float{bottom:12px;left:12px}}

/* ── PROCESS ── */
.proc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:48px;position:relative}
.proc-grid::before{content:'';position:absolute;top:32px;left:10%;right:10%;height:1px;background:var(--border);z-index:0}
.proc-item{text-align:center;padding:0 16px;position:relative;z-index:1}
.proc-n{width:64px;height:64px;border-radius:50%;background:white;border:1px solid var(--border);
  font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:var(--gold);
  display:flex;align-items:center;justify-content:center;margin:0 auto 16px;
  transition:background .25s,border-color .25s}
.proc-item:hover .proc-n{background:var(--gold);color:white;border-color:var(--gold)}
.proc-title{font-size:13px;font-weight:600;color:var(--dark);margin-bottom:6px}
.proc-desc{font-size:11.5px;color:var(--muted);line-height:1.65}
@media(max-width:1024px){.proc-grid{grid-template-columns:repeat(2,1fr);row-gap:32px}.proc-grid::before{display:none}}
@media(max-width:767px){.proc-grid{grid-template-columns:1fr}}

/* ── REVIEWS ── */
.rev-track{display:flex;gap:16px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.rev-track::-webkit-scrollbar{display:none}
.rev-card{background:white;border-radius:var(--r-lg);padding:24px;min-width:320px;flex-shrink:0;
  border:1px solid var(--border);box-shadow:var(--sh-sm)}
.rev-stars{color:var(--gold);font-size:11px;margin-bottom:12px;letter-spacing:2px}
.rev-q{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:400;font-style:italic;
  color:var(--dark);line-height:1.5;margin-bottom:18px}
.rev-author{display:flex;align-items:center;gap:10px}
.rev-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover}
.rev-name{font-size:12.5px;font-weight:600;color:var(--dark)}
.rev-loc{font-size:10.5px;color:var(--muted);margin-top:1px}
@media(max-width:767px){.rev-card{min-width:80vw}}

/* ── NEWSLETTER ── */
.newsletter{background:var(--cream2);padding:64px var(--px);display:flex;align-items:center;justify-content:space-between;gap:40px;border-top:1px solid var(--border)}
.nl-left .sec-title{font-size:clamp(24px,2.8vw,36px)}
.nl-left p{font-size:13px;color:var(--muted);margin-top:8px}
.nl-form{display:flex;gap:10px;flex-wrap:wrap}
.nl-input{flex:1;min-width:200px;border:1.5px solid var(--border);background:white;
  border-radius:var(--pill);padding:12px 20px;font-size:13px;font-family:'Outfit',sans-serif;
  color:var(--text);outline:none;transition:border-color .2s}
.nl-input:focus{border-color:var(--gold)}
.nl-input::placeholder{color:var(--muted)}
@media(max-width:767px){.newsletter{flex-direction:column;text-align:center}.nl-form{width:100%}.eyebrow.nl-ey{justify-content:center}.eyebrow.nl-ey::before{display:none}}

/* ── OFFER BANNER ── */
.offer{background:linear-gradient(135deg,#1a2b1c 0%,#243d26 55%,#1a2b1c 100%);
  text-align:center;padding:80px var(--px);position:relative;overflow:hidden}
.offer-title{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,4vw,50px);
  font-weight:300;color:var(--cream);line-height:1.1;margin-bottom:12px}
.offer-title em{color:var(--gold);font-style:italic}
.offer-desc{font-size:13px;color:rgba(250,246,240,.5);margin-bottom:28px}
.offer-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.offer-code{display:inline-block;margin:0 auto 18px;background:rgba(196,151,58,.1);
  border:1px solid rgba(196,151,58,.28);border-radius:var(--pill);
  padding:5px 16px;font-size:11px;letter-spacing:.12em;color:var(--gold-light);font-weight:600}

/* ── FOOTER ── */
.footer{background:var(--dark2);padding:56px var(--px) 28px}
.footer-top{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;

<body>
<div id="root"></div>
<div id="toast-root"></div>
<!-- Removed: #cur, #cur-r custom cursor elements -->

<script>
const PAGE_TITLES = {
  '/': 'Bouquet Studio — Handcrafted Ribbon Flowers, Sydney',
  '/bouquets': 'Browse Collection — Bouquet Studio',
  '/custom': 'Custom Bouquet Builder — Bouquet Studio',
  '/about': 'Our Story — Bouquet Studio',
  '/contact': 'Contact Us — Bouquet Studio',
  '/cart': 'Your Cart — Bouquet Studio',
  '/login': 'Login — Bouquet Studio',
};
const DARK_NAV_PAGES = new Set(['/about']);
function updateTitle(p) { document.title = PAGE_TITLES[p] || 'Bouquet Studio'; }

function getStoredCart() {
  try { return JSON.parse(localStorage.getItem('bs_cart') || '[]'); } catch(e){ return []; }
}
function saveCart(items) {
  try { localStorage.setItem('bs_cart', JSON.stringify(items)); } catch(e){}
}

function _extends() { return _extends = Object.assign ? Object.assign.bind() : function (n) { for (var e = 1; e < arguments.length; e++) { var t = arguments[e]; for (var r in t) ({}).hasOwnProperty.call(t, r) && (n[r] = t[r]); } return n; }, _extends.apply(null, arguments); }
const { useState, useLayoutEffect, useEffect, useRef, useCallback, createContext, useContext } = React;
gsap.registerPlugin(ScrollTrigger);

/* ── Streamlined motion constants — faster, more functional ── */
const M = {
  ease: { out: 'power2.out', expo: 'expo.out' },
  dur:  { fast: .22, base: .42, slow: .62 }
};

/* ─── ROUTER ─── */
const RouterCtx = createContext(null);
function RouterProvider({ children }) {
  const [path, setPath] = useState(window.location.hash.slice(1) || '/');
  const navigate = useCallback(to => {
    window.location.hash = to;
    setPath(to);
    updateTitle(to);
    window.scrollTo({ top: 0, behavior: 'instant' });
  }, []);
  useEffect(() => {
    const fn = () => { const p = window.location.hash.slice(1) || '/'; setPath(p); updateTitle(p); };
    window.addEventListener('hashchange', fn);
    return () => window.removeEventListener('hashchange', fn);
  }, []);
  return React.createElement(RouterCtx.Provider, { value: { path, navigate } }, children);
}
const useRouter = () => useContext(RouterCtx);

/* ─── CART CONTEXT ─── */
const CartCtx = createContext(null);
function CartProvider({ children }) {
  const [items, setItems] = useState(getStoredCart);
  useEffect(() => { saveCart(items); }, [items]);
  const add = useCallback(product => {
    setItems(prev => {
      const ex = prev.find(i => i.name === product.name);
      if (ex) return prev.map(i => i.name === product.name ? { ...i, qty: i.qty + 1 } : i);
      return [...prev, { ...product, qty: 1 }];
    });
    toast(`${product.name} added to cart`);
  }, []);
  const remove = useCallback(name => setItems(prev => prev.filter(i => i.name !== name)), []);
  const updateQty = useCallback((name, delta) => {
    setItems(prev => prev.map(i => i.name === name ? { ...i, qty: Math.max(1, i.qty + delta) } : i));
  }, []);
  const total = items.reduce((s, i) => s + parseFloat(i.price.replace('$', '')) * i.qty, 0);
  const count = items.reduce((s, i) => s + i.qty, 0);
  return React.createElement(CartCtx.Provider, { value: { items, add, remove, updateQty, total, count } }, children);
}
const useCart = () => useContext(CartCtx);

/* ─── WISHLIST CONTEXT ─── */
const WishCtx = createContext(null);
function WishlistProvider({ children }) {
  const [wished, setWished] = useState([]);
  const toggle = useCallback(name => {
    setWished(prev => prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]);
  }, []);
  return React.createElement(WishCtx.Provider, { value: { wished, toggle } }, children);
}
const useWishlist = () => useContext(WishCtx);

/* ─── TOAST ─── */
function toast(msg) {
  const root = document.getElementById('toast-root');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span class="toast-dot"></span>${msg}`;
  root.appendChild(el);
  gsap.to(el, { opacity: 1, y: 0, duration: M.dur.fast, ease: M.ease.expo });
  setTimeout(() => {
    gsap.to(el, { opacity: 0, y: 6, duration: M.dur.fast, ease: M.ease.out, onComplete: () => el.remove() });
  }, 2600);
}

/* ─── SCROLL REVEAL HOOK ─── Only animate section titles + card groups ─── */
function useReveal(scopeRef, fn) {
  useLayoutEffect(() => {
    const ctx = gsap.context(fn, scopeRef);
    return () => ctx.revert();
  }, []);
