<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bouquet Studio — Handcrafted Ribbon Flowers, Sydney</title>
<meta name="description" content="Curated ribbon flower bouquets handcrafted in Sydney. Same-day delivery across Australia. Shop bridal, birthday, anniversary and custom bouquets."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
:root{
  --cream:#faf6f0; --cream2:#f2ece2;
  --dark:#1a2b1c;  --dark2:#111a12;
  --gold:#c4973a;  --gold-light:#e8d5a3;
  --blush:#deb8b0; --blush-light:#f5e8e4;
  --text:#2c2c2a;  --muted:#7a7060;
  --border:rgba(196,151,58,.2);
  --sh-sm:0 1px 4px rgba(0,0,0,.05);
  --sh-md:0 4px 24px rgba(0,0,0,.07);
  --sh-lg:0 16px 56px rgba(0,0,0,.11);
  --sh-xl:0 28px 72px rgba(0,0,0,.14);
  --px:64px; --py:96px; --nav-h:76px;
  --r-sm:12px; --r-md:20px; --r-lg:28px; --pill:100px;
  --ease-expo:cubic-bezier(.16,1,.3,1);
}
@media(max-width:1024px){:root{--px:40px;--py:80px}}
@media(max-width:767px) {:root{--px:20px;--py:64px;--nav-h:60px}}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
img{display:block;max-width:100%}
button{font-family:inherit}
ul{list-style:none}
a{text-decoration:none}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden}
@media(hover:hover){body{cursor:none}}

.grain{position:fixed;inset:0;pointer-events:none;z-index:9000;opacity:.035;
  background-size:200px 200px;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

#cur,#cur-r{position:fixed;top:0;left:0;pointer-events:none;border-radius:50%;transform:translate(-50%,-50%);opacity:0;z-index:9999}
#cur  {width:8px;height:8px;background:var(--gold);transition:width .18s,height .18s,background .18s}
#cur-r{width:30px;height:30px;border:1.5px solid var(--gold);z-index:9998;opacity:0}
body:has(a:hover) #cur,body:has(button:hover) #cur{width:34px;height:34px;background:var(--blush)}
@media(hover:none){#cur,#cur-r{display:none}}

#toast-root{position:fixed;bottom:28px;right:28px;z-index:8000;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast{background:var(--dark);color:var(--cream);padding:12px 20px;border-radius:var(--pill);
  font-size:13px;font-weight:500;letter-spacing:.04em;
  display:flex;align-items:center;gap:10px;
  box-shadow:var(--sh-xl);pointer-events:none;
  transform:translateY(16px);opacity:0}
.toast-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0}

/* NAV */
.nav{position:fixed;inset:0 0 auto 0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  height:var(--nav-h);padding:0 var(--px);
  transition:background .45s,border-color .45s,backdrop-filter .45s}
.nav.scrolled{background:rgba(250,246,240,.92);backdrop-filter:blur(20px) saturate(1.4);border-bottom:1px solid var(--border)}
.nav.nav-light .nav-logo{color:var(--cream)}
.nav.nav-light .nav-logo span{color:var(--gold)}
.nav.nav-light .nav-links a{color:var(--cream)}
.nav.nav-light .nav-links a:hover,.nav.nav-light .nav-links a.active{color:var(--gold)}
.nav.nav-light .nav-cart-btn{color:var(--cream)}
.nav.nav-light .hamburger span{background:var(--cream)}
.nav.nav-light .btn-nav{background:rgba(250,246,240,.15);border:1.5px solid rgba(250,246,240,.3);color:var(--cream)}
.nav.nav-light .btn-nav:hover{background:var(--gold);border-color:var(--gold);color:var(--dark)}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:.08em;color:var(--dark);cursor:pointer}
.nav-logo span{color:var(--gold)}
.nav-links{display:flex;gap:32px}
.nav-links a{font-size:11.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text);opacity:.62;transition:opacity .2s,color .2s;cursor:pointer}
.nav-links a:hover,.nav-links a.active{opacity:1;color:var(--gold)}
.nav-actions{display:flex;gap:12px;align-items:center}
.nav-cart-btn{background:none;border:none;cursor:pointer;font-size:12px;font-weight:500;letter-spacing:.08em;color:var(--text);opacity:.62;transition:opacity .2s;display:flex;align-items:center;gap:5px}
.nav-cart-btn:hover{opacity:1}
.cart-count{background:var(--gold);color:white;width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:transform .2s}
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px}
.hamburger span{display:block;width:22px;height:1.5px;background:var(--dark);border-radius:2px}
.mob-menu{position:fixed;inset:0;z-index:300;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transform:translateX(100%);visibility:hidden}
.mob-close{position:absolute;top:20px;right:var(--px);background:none;border:none;cursor:pointer;font-size:28px;color:rgba(250,246,240,.45);line-height:1}
.mob-links{display:flex;flex-direction:column;align-items:center;gap:4px}
.mob-links a{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:300;font-style:italic;color:var(--cream);opacity:.7;transition:opacity .2s,color .2s;cursor:pointer}
.mob-links a:hover{opacity:1;color:var(--gold)}
.mob-cta{margin-top:24px}
@media(max-width:767px){.nav-links,.cart-label,.btn-nav{display:none}.hamburger{display:flex}}

/* HERO */
.hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;
  padding:calc(var(--nav-h) + 48px) var(--px) 72px;position:relative;overflow:hidden;gap:40px}
.hero-orb{position:absolute;right:-60px;top:50%;transform:translateY(-50%);
  width:640px;height:640px;
  background:radial-gradient(ellipse,var(--blush-light) 0%,transparent 68%);
  border-radius:50%;pointer-events:none}
.hero-left{position:relative;z-index:2;max-width:540px}
.hero-eyebrow{display:flex;align-items:center;gap:12px;font-size:10px;font-weight:600;
  letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:24px}
.hero-eyebrow::before{content:'';width:34px;height:1px;background:var(--gold)}
.line{overflow:hidden;display:block}
.line-inner{display:block}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(52px,5.6vw,80px);
  font-weight:300;line-height:1.06;color:var(--dark);margin-bottom:24px}
.hero-title em{font-style:italic;color:var(--gold)}
.hero-desc{font-size:14.5px;font-weight:300;color:var(--muted);line-height:1.85;max-width:360px;margin-bottom:38px}
.hero-cta{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.hero-stats{display:flex;gap:32px;margin-top:48px;padding-top:32px;border-top:1px solid var(--border)}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:400;color:var(--dark);line-height:1}
.stat-lbl{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}
.hero-right{position:relative;z-index:2;display:flex;align-items:center;justify-content:center}
.hero-img-frame{width:420px;height:520px;border-radius:200px 200px 160px 160px;overflow:hidden;position:relative;z-index:2;flex-shrink:0}
.hero-img-frame img{width:100%;height:100%;object-fit:cover;object-position:center top}
.hero-badge{position:absolute;top:40px;left:-20px;background:white;border-radius:var(--r-sm);
  padding:14px 18px;box-shadow:var(--sh-lg);z-index:4}
.hero-badge-label{font-size:10px;font-weight:600;letter-spacing:.12em;color:var(--gold);text-transform:uppercase}
.hero-badge-sub{font-size:12px;color:var(--text);margin-top:3px}
.hero-float-pill{position:absolute;bottom:48px;right:-16px;background:var(--dark);color:var(--cream);
  border-radius:var(--pill);padding:10px 18px;z-index:4;box-shadow:var(--sh-lg);
  font-size:12px;font-weight:500;letter-spacing:.06em;white-space:nowrap}
.hero-float-pill span{color:var(--gold)}
.hero-petal{position:absolute;font-size:28px;pointer-events:none;opacity:.45}
@media(max-width:1024px){.hero-img-frame{width:350px;height:440px}}
@media(max-width:767px){
  .hero{grid-template-columns:1fr;min-height:auto;padding-bottom:56px}
  .hero-right{margin-top:36px}
  .hero-img-frame{width:100%;max-width:300px;height:360px;margin:0 auto}
  .hero-badge{top:16px;left:0}
  .hero-float-pill{bottom:16px;right:0}
  .hero-stats{gap:20px}
}

/* RIBBON */
.ribbon{background:var(--dark);padding:16px 0;overflow:hidden;border-top:1px solid rgba(196,151,58,.15);border-bottom:1px solid rgba(196,151,58,.15)}
.ribbon-track{display:flex;white-space:nowrap}
.ribbon-item{display:flex;align-items:center;gap:16px;padding:0 26px;
  font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:400;font-style:italic;
  color:var(--gold-light);letter-spacing:.05em}
.ribbon-dot{width:4px;height:4px;background:var(--gold);border-radius:50%;flex-shrink:0}

/* FEATURES */
.features{background:var(--cream2);display:grid;grid-template-columns:repeat(3,1fr);
  border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.feat-item{padding:40px var(--px);display:flex;align-items:flex-start;gap:16px;border-right:1px solid var(--border)}
.feat-item:last-child{border-right:none}
.feat-icon{font-size:22px;width:48px;height:48px;background:white;border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;box-shadow:var(--sh-sm);flex-shrink:0}
.feat-title{font-size:13.5px;font-weight:600;color:var(--dark);margin-bottom:5px}
.feat-desc{font-size:12.5px;font-weight:300;color:var(--muted);line-height:1.7}
@media(max-width:1024px){
  .features{grid-template-columns:1fr}
  .feat-item{border-right:none;border-bottom:1px solid var(--border);padding:28px var(--px)}
  .feat-item:last-child{border-bottom:none}
}

/* SHARED */
.section{padding:var(--py) var(--px)}
.eyebrow{display:flex;align-items:center;gap:11px;font-size:10px;font-weight:600;
  letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:13px}
.eyebrow::before{content:'';width:26px;height:1px;background:var(--gold)}
.eyebrow.light{color:var(--gold-light)}
.eyebrow.light::before{background:var(--gold-light)}
.eyebrow.center{justify-content:center}
.eyebrow.center::before{display:none}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:clamp(34px,3.8vw,52px);
  font-weight:300;line-height:1.1;color:var(--dark)}
.sec-title em{font-style:italic;color:var(--gold)}
.sec-title.light{color:var(--cream)}

/* COLLECTION */
.coll-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:48px}
.coll-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.card{background:white;border-radius:var(--r-lg);overflow:hidden;position:relative;
  box-shadow:var(--sh-sm);transition:box-shadow .4s,transform .4s;cursor:pointer}
.card:hover{box-shadow:var(--sh-xl);transform:translateY(-4px)}
.card-shell{overflow:hidden}
.card-img{width:100%;height:260px;object-fit:cover;transition:transform .55s cubic-bezier(.25,.46,.45,.94)}
.card:hover .card-img{transform:scale(1.05)}
.card-body{padding:18px 20px 22px}
.card-tag{font-size:9.5px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
.card-name{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:400;color:var(--dark);margin-bottom:7px}
.card-desc{font-size:12px;color:var(--muted);line-height:1.65;margin-bottom:14px}
.card-foot{display:flex;justify-content:space-between;align-items:center}
.card-price{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--dark)}
.card-bdg{position:absolute;top:13px;left:13px;background:var(--dark);color:var(--cream);
  font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  padding:4px 10px;border-radius:var(--pill)}
.card-bdg.gold{background:var(--gold)}
@media(max-width:1024px){.coll-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:767px){.coll-grid{grid-template-columns:1fr}.coll-head{flex-direction:column;align-items:flex-start;gap:16px}}

/* BESPOKE */
.bespoke{background:var(--dark);display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:64px;padding:104px var(--px)}
.bespoke-desc{font-size:14px;font-weight:300;color:rgba(250,246,240,.6);line-height:1.85;margin:20px 0 34px;max-width:390px}
.bespoke-steps{display:flex;flex-direction:column;gap:18px;margin-bottom:36px}
.bespoke-step{display:flex;align-items:center;gap:14px}
.step-n{width:32px;height:32px;border-radius:50%;border:1px solid var(--gold);color:var(--gold);
  font-family:'Cormorant Garamond',serif;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-t{font-size:13px;color:rgba(250,246,240,.72);font-weight:300}
.bespoke-img-wrap{position:relative}
.bespoke-img{width:100%;height:500px;object-fit:cover;border-radius:var(--r-lg)}
.bespoke-float{position:absolute;bottom:-16px;left:-20px;background:var(--gold);
  border-radius:var(--r-md);padding:16px 22px;width:200px;box-shadow:var(--sh-lg)}
.bespoke-float-t{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--dark);font-weight:600}
.bespoke-float-s{font-size:11px;color:rgba(26,43,28,.65);margin-top:2px}
@media(max-width:767px){.bespoke{grid-template-columns:1fr;gap:40px;padding:64px var(--px)}.bespoke-float{bottom:14px;left:14px}}

/* PROCESS */
.proc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:56px;position:relative}
.proc-grid::before{content:'';position:absolute;top:36px;left:10%;right:10%;height:1px;background:var(--border);z-index:0}
.proc-item{text-align:center;padding:0 18px;position:relative;z-index:1}
.proc-n{width:72px;height:72px;border-radius:50%;background:white;border:1px solid var(--border);
  font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;color:var(--gold);
  display:flex;align-items:center;justify-content:center;margin:0 auto 20px;
  transition:background .3s,border-color .3s,color .3s}
.proc-item:hover .proc-n{background:var(--gold);color:white;border-color:var(--gold)}
.proc-title{font-size:14px;font-weight:600;color:var(--dark);margin-bottom:7px}
.proc-desc{font-size:12px;color:var(--muted);line-height:1.7}
@media(max-width:1024px){.proc-grid{grid-template-columns:repeat(2,1fr);row-gap:36px}.proc-grid::before{display:none}}
@media(max-width:767px){.proc-grid{grid-template-columns:1fr}}

/* REVIEWS */
.rev-track{display:flex;gap:18px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.rev-track::-webkit-scrollbar{display:none}
.rev-card{background:white;border-radius:var(--r-lg);padding:28px;min-width:340px;flex-shrink:0;
  border:1px solid var(--border);box-shadow:var(--sh-sm)}
.rev-stars{color:var(--gold);font-size:12px;margin-bottom:14px;letter-spacing:2px}
.rev-q{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;font-style:italic;
  color:var(--dark);line-height:1.55;margin-bottom:20px}
.rev-author{display:flex;align-items:center;gap:10px}
.rev-avatar{width:38px;height:38px;border-radius:50%;object-fit:cover}
.rev-name{font-size:13px;font-weight:600;color:var(--dark)}
.rev-loc{font-size:11px;color:var(--muted);margin-top:1px}
@media(max-width:767px){.rev-card{min-width:82vw}}

/* NEWSLETTER */
.newsletter{background:var(--cream2);padding:72px var(--px);display:flex;align-items:center;justify-content:space-between;gap:40px;border-top:1px solid var(--border)}
.nl-left .sec-title{font-size:clamp(28px,3vw,40px)}
.nl-left p{font-size:14px;color:var(--muted);margin-top:10px}
.nl-form{display:flex;gap:10px;flex-wrap:wrap}
.nl-input{flex:1;min-width:220px;border:1px solid var(--border);background:white;
  border-radius:var(--pill);padding:13px 22px;font-size:13px;font-family:'Outfit',sans-serif;
  color:var(--text);outline:none;transition:border-color .2s}
.nl-input:focus{border-color:var(--gold)}
.nl-input::placeholder{color:var(--muted)}
@media(max-width:767px){.newsletter{flex-direction:column;text-align:center}.nl-form{width:100%}.eyebrow.nl-ey{justify-content:center}.eyebrow.nl-ey::before{display:none}}

/* OFFER */
.offer{background:linear-gradient(140deg,#1a2b1c 0%,#243d26 55%,#1a2b1c 100%);
  text-align:center;padding:104px var(--px);position:relative;overflow:hidden}
.offer-orb{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:520px;height:520px;background:radial-gradient(ellipse,rgba(196,151,58,.12) 0%,transparent 68%);
  border-radius:50%;pointer-events:none}
.offer-title{font-family:'Cormorant Garamond',serif;font-size:clamp(38px,4.8vw,60px);
  font-weight:300;color:var(--cream);line-height:1.08;margin-bottom:16px;position:relative}
.offer-title em{color:var(--gold);font-style:italic}
.offer-desc{font-size:14px;color:rgba(250,246,240,.52);margin-bottom:36px;position:relative}
.offer-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;position:relative}
.offer-code{display:inline-block;margin:0 auto 20px;background:rgba(196,151,58,.12);
  border:1px solid rgba(196,151,58,.3);border-radius:var(--pill);
  padding:6px 18px;font-size:12px;letter-spacing:.12em;color:var(--gold-light);
  font-weight:500;position:relative}

/* FOOTER */
.footer{background:var(--dark2);padding:64px var(--px) 32px}
.footer-top{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;
  padding-bottom:48px;border-bottom:1px solid rgba(255,255,255,.07)}
.footer-brand p{font-size:12px;color:rgba(250,246,240,.38);line-height:1.85;max-width:230px;margin-top:13px}
.footer-col h4{font-size:10.5px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;
  color:var(--gold-light);margin-bottom:16px}
.footer-col ul{display:flex;flex-direction:column;gap:8px}
.footer-col a{font-size:12px;color:rgba(250,246,240,.36);transition:color .2s;cursor:pointer}
.footer-col a:hover{color:var(--gold-light)}
.footer-bottom{padding-top:24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.footer-copy{font-size:11px;color:rgba(250,246,240,.22)}
.footer-legal{display:flex;gap:16px}
.footer-legal a{font-size:11px;color:rgba(250,246,240,.25);transition:color .2s;cursor:pointer}
.footer-legal a:hover{color:var(--gold)}
.footer-socials{display:flex;gap:16px}
.footer-socials a{font-size:11px;color:rgba(250,246,240,.28);letter-spacing:.08em;transition:color .2s;cursor:pointer}
.footer-socials a:hover{color:var(--gold)}
@media(max-width:1024px){.footer-top{grid-template-columns:1fr 1fr 1fr}}
@media(max-width:767px){.footer-top{grid-template-columns:1fr 1fr;gap:28px}.footer-bottom{flex-direction:column;text-align:center}}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:6000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s;backdrop-filter:blur(4px)}
.modal-bg.open{opacity:1;visibility:visible}
.modal-box{background:var(--cream);border-radius:var(--r-lg);width:90%;max-width:560px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;transform:scale(.95);transition:transform .35s var(--ease-expo)}
.modal-bg.open .modal-box{transform:scale(1)}
