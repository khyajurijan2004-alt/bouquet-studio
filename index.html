<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<style>
/* ══════════════════════════════════════════
   TOKENS
══════════════════════════════════════════ */
:root{
  --cream:#faf6f0; --cream2:#f2ece2;
  --dark:#1a2b1c;  --dark2:#111a12;
  --gold:#c4973a;  --gold-light:#e8d5a3;
  --blush:#deb8b0; --blush-light:#f5e8e4;
  --text:#2c2c2a;  --muted:#7a7060;
  --border:rgba(196,151,58,.2);
  --sh-sm:0 1px 4px rgba(0,0,0,.05);
  --sh-md:0 4px 24px rgba(0,0,0,.07);
  --sh-lg:0 16px 56px rgba(0,0,0,.11);
  --sh-xl:0 28px 72px rgba(0,0,0,.14);
  --px:64px; --py:96px; --nav-h:76px;
  --r-sm:12px; --r-md:20px; --r-lg:28px; --pill:100px;
  --ease-expo:cubic-bezier(.16,1,.3,1);
}
@media(max-width:1024px){:root{--px:40px;--py:80px}}
@media(max-width:767px) {:root{--px:20px;--py:64px;--nav-h:60px}}

/* ══════════════════════════════════════════
   RESET
══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
img{display:block;max-width:100%}
button{font-family:inherit}
ul{list-style:none}
a{text-decoration:none}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden}
@media(hover:hover){body{cursor:none}}

/* ══════════════════════════════════════════
   GRAIN
══════════════════════════════════════════ */
.grain{position:fixed;inset:0;pointer-events:none;z-index:9000;opacity:.035;
  background-size:200px 200px;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* ══════════════════════════════════════════
   CURSOR  — hidden until first mousemove
══════════════════════════════════════════ */
#cur,#cur-r{position:fixed;top:0;left:0;pointer-events:none;border-radius:50%;transform:translate(-50%,-50%);opacity:0;z-index:9999}
#cur  {width:8px;height:8px;background:var(--gold);transition:width .18s,height .18s,background .18s}
#cur-r{width:30px;height:30px;border:1.5px solid var(--gold);z-index:9998;opacity:0}
body:has(a:hover) #cur,body:has(button:hover) #cur{width:34px;height:34px;background:var(--blush)}
@media(hover:none){#cur,#cur-r{display:none}}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
#toast-root{position:fixed;bottom:28px;right:28px;z-index:8000;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast{background:var(--dark);color:var(--cream);padding:12px 20px;border-radius:var(--pill);
  font-size:13px;font-weight:500;letter-spacing:.04em;
  display:flex;align-items:center;gap:10px;
  box-shadow:var(--sh-xl);pointer-events:none;
  transform:translateY(16px);opacity:0}
.toast-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0}

/* ══════════════════════════════════════════
   CART DRAWER
══════════════════════════════════════════ */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:5000;opacity:0;visibility:hidden;backdrop-filter:blur(3px);transition:opacity .35s,visibility .35s}
.cart-overlay.open{opacity:1;visibility:visible}
.cart-drawer{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:100vw;
  background:var(--cream);z-index:5001;
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .45s var(--ease-expo)}
.cart-overlay.open .cart-drawer{transform:translateX(0)}
.cart-head{display:flex;justify-content:space-between;align-items:center;padding:24px 28px;border-bottom:1px solid var(--border)}
.cart-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:var(--dark)}
.cart-close{background:none;border:none;cursor:none;font-size:22px;color:var(--muted);line-height:1;transition:color .2s}
.cart-close:hover{color:var(--dark)}
.cart-body{flex:1;overflow-y:auto;padding:20px 28px}
.cart-empty{text-align:center;padding:60px 0;color:var(--muted);font-size:14px}
.cart-empty-icon{font-size:40px;margin-bottom:14px}
.cart-item{display:flex;gap:14px;padding:16px 0;border-bottom:1px solid var(--border)}
.cart-item-img{width:72px;height:72px;border-radius:var(--r-sm);object-fit:cover;flex-shrink:0}
.cart-item-info{flex:1}
.cart-item-name{font-size:14px;font-weight:600;color:var(--dark);margin-bottom:3px}
.cart-item-tag{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.cart-item-price{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--dark)}
.cart-item-remove{background:none;border:none;cursor:none;color:var(--muted);font-size:18px;align-self:flex-start;transition:color .2s;line-height:1}
.cart-item-remove:hover{color:var(--dark)}
.cart-foot{padding:20px 28px;border-top:1px solid var(--border)}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cart-total-label{font-size:13px;color:var(--muted)}
.cart-total-val{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--dark)}
.cart-note{font-size:11.5px;color:var(--muted);margin-bottom:16px}

/* ══════════════════════════════════════════
   NAV
══════════════════════════════════════════ */
.nav{position:fixed;inset:0 0 auto 0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  height:var(--nav-h);padding:0 var(--px);
  transition:background .45s,border-color .45s,backdrop-filter .45s}
.nav.scrolled{background:rgba(250,246,240,.92);backdrop-filter:blur(20px) saturate(1.4);border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:.08em;color:var(--dark)}
.nav-logo span{color:var(--gold)}
.nav-links{display:flex;gap:32px}
.nav-links a{font-size:11.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text);opacity:.62;transition:opacity .2s,color .2s}
.nav-links a:hover{opacity:1;color:var(--gold)}
.nav-actions{display:flex;gap:12px;align-items:center}
.nav-cart-btn{background:none;border:none;cursor:none;font-size:12px;font-weight:500;letter-spacing:.08em;color:var(--text);opacity:.62;transition:opacity .2s;display:flex;align-items:center;gap:5px}
.nav-cart-btn:hover{opacity:1}
.cart-count{background:var(--gold);color:white;width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:transform .2s}
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px}
.hamburger span{display:block;width:22px;height:1.5px;background:var(--dark);border-radius:2px}
/* Mobile menu */
.mob-menu{position:fixed;inset:0;z-index:300;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transform:translateX(100%);visibility:hidden}
.mob-close{position:absolute;top:20px;right:var(--px);background:none;border:none;cursor:pointer;font-size:28px;color:rgba(250,246,240,.45);line-height:1}
.mob-links{display:flex;flex-direction:column;align-items:center;gap:4px}
.mob-links a{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:300;font-style:italic;color:var(--cream);opacity:.7;transition:opacity .2s,color .2s}
.mob-links a:hover{opacity:1;color:var(--gold)}
.mob-cta{margin-top:24px}
@media(max-width:767px){.nav-links,.nav-cart-btn .cart-label,.btn-nav{display:none}.hamburger{display:flex}}

/* ══════════════════════════════════════════
   HERO
══════════════════════════════════════════ */
.hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;
  padding:calc(var(--nav-h) + 48px) var(--px) 72px;position:relative;overflow:hidden;gap:40px}
.hero-orb{position:absolute;right:-60px;top:50%;transform:translateY(-50%);
  width:640px;height:640px;
  background:radial-gradient(ellipse,var(--blush-light) 0%,transparent 68%);
  border-radius:50%;pointer-events:none}
.hero-left{position:relative;z-index:2;max-width:540px}
.hero-eyebrow{display:flex;align-items:center;gap:12px;font-size:10px;font-weight:600;
  letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:24px}
.hero-eyebrow::before{content:'';width:34px;height:1px;background:var(--gold)}
.line{overflow:hidden;display:block}
.line-inner{display:block}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(52px,5.6vw,80px);
  font-weight:300;line-height:1.06;color:var(--dark);margin-bottom:24px}
.hero-title em{font-style:italic;color:var(--gold)}
.hero-desc{font-size:14.5px;font-weight:300;color:var(--muted);line-height:1.85;max-width:360px;margin-bottom:38px}
.hero-cta{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.hero-stats{display:flex;gap:32px;margin-top:48px;padding-top:32px;border-top:1px solid var(--border)}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:400;color:var(--dark);line-height:1}
.stat-lbl{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}
/* Hero right — single clean image, no broken accent */
.hero-right{position:relative;z-index:2;display:flex;align-items:center;justify-content:center}
.hero-img-frame{width:420px;height:520px;border-radius:200px 200px 160px 160px;overflow:hidden;position:relative;z-index:2;flex-shrink:0}
.hero-img-frame img{width:100%;height:100%;object-fit:cover;object-position:center top}
.hero-badge{position:absolute;top:40px;left:-20px;background:white;border-radius:var(--r-sm);
  padding:14px 18px;box-shadow:var(--sh-lg);z-index:4}
.hero-badge-label{font-size:10px;font-weight:600;letter-spacing:.12em;color:var(--gold);text-transform:uppercase}
.hero-badge-sub{font-size:12px;color:var(--text);margin-top:3px}
.hero-float-pill{position:absolute;bottom:48px;right:-16px;background:var(--dark);color:var(--cream);
  border-radius:var(--pill);padding:10px 18px;z-index:4;box-shadow:var(--sh-lg);
  font-size:12px;font-weight:500;letter-spacing:.06em;white-space:nowrap}
.hero-float-pill span{color:var(--gold)}
.hero-petal{position:absolute;font-size:28px;pointer-events:none;opacity:.45}
@media(max-width:1024px){.hero-img-frame{width:350px;height:440px}}
@media(max-width:767px){
  .hero{grid-template-columns:1fr;min-height:auto;padding-bottom:56px}
  .hero-right{margin-top:36px}
  .hero-img-frame{width:100%;max-width:300px;height:360px;margin:0 auto}
  .hero-badge{top:16px;left:0}
  .hero-float-pill{bottom:16px;right:0}
  .hero-stats{gap:20px}
}

/* ══════════════════════════════════════════
   RIBBON (Marquee)
══════════════════════════════════════════ */
.ribbon{background:var(--dark);padding:16px 0;overflow:hidden;border-top:1px solid rgba(196,151,58,.15);border-bottom:1px solid rgba(196,151,58,.15)}
.ribbon-track{display:flex;white-space:nowrap}
.ribbon-item{display:flex;align-items:center;gap:16px;padding:0 26px;
  font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:400;font-style:italic;
  color:var(--gold-light);letter-spacing:.05em}
.ribbon-dot{width:4px;height:4px;background:var(--gold);border-radius:50%;flex-shrink:0}

/* ══════════════════════════════════════════
   FEATURES
══════════════════════════════════════════ */
.features{background:var(--cream2);display:grid;grid-template-columns:repeat(3,1fr);
  border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.feat-item{padding:40px var(--px);display:flex;align-items:flex-start;gap:16px;border-right:1px solid var(--border)}
.feat-item:last-child{border-right:none}
.feat-icon{font-size:22px;width:48px;height:48px;background:white;border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;box-shadow:var(--sh-sm);flex-shrink:0}
.feat-title{font-size:13.5px;font-weight:600;color:var(--dark);margin-bottom:5px}
.feat-desc{font-size:12.5px;font-weight:300;color:var(--muted);line-height:1.7}
@media(max-width:1024px){
  .features{grid-template-columns:1fr}
  .feat-item{border-right:none;border-bottom:1px solid var(--border);padding:28px var(--px)}
  .feat-item:last-child{border-bottom:none}
}

/* ══════════════════════════════════════════
   SHARED ATOMS
══════════════════════════════════════════ */
.section{padding:var(--py) var(--px)}
.eyebrow{display:flex;align-items:center;gap:11px;font-size:10px;font-weight:600;
  letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:13px}
.eyebrow::before{content:'';width:26px;height:1px;background:var(--gold)}
.eyebrow.light{color:var(--gold-light)}
.eyebrow.light::before{background:var(--gold-light)}
.eyebrow.center{justify-content:center}
.eyebrow.center::before{display:none}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:clamp(34px,3.8vw,52px);
  font-weight:300;line-height:1.1;color:var(--dark)}
.sec-title em{font-style:italic;color:var(--gold)}
.sec-title.light{color:var(--cream)}

/* ══════════════════════════════════════════
   COLLECTION
══════════════════════════════════════════ */
.coll-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:48px}
.coll-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.card{background:white;border-radius:var(--r-lg);overflow:hidden;position:relative;
  box-shadow:var(--sh-sm);transition:box-shadow .4s,transform .4s;cursor:none}
.card:hover{box-shadow:var(--sh-xl);transform:translateY(-4px)}
.card-shell{overflow:hidden}
.card-img{width:100%;height:260px;object-fit:cover;transition:transform .55s cubic-bezier(.25,.46,.45,.94)}
.card:hover .card-img{transform:scale(1.05)}
.card-body{padding:18px 20px 22px}
.card-tag{font-size:9.5px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
.card-name{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:400;color:var(--dark);margin-bottom:7px}
.card-desc{font-size:12px;color:var(--muted);line-height:1.65;margin-bottom:14px}
.card-foot{display:flex;justify-content:space-between;align-items:center}
.card-price{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--dark)}
.card-bdg{position:absolute;top:13px;left:13px;background:var(--dark);color:var(--cream);
  font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  padding:4px 10px;border-radius:var(--pill)}
.card-bdg.gold{background:var(--gold)}
@media(max-width:1024px){.coll-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:767px){.coll-grid{grid-template-columns:1fr}.coll-head{flex-direction:column;align-items:flex-start;gap:16px}}

/* ══════════════════════════════════════════
   BESPOKE
══════════════════════════════════════════ */
.bespoke{background:var(--dark);display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:64px;padding:104px var(--px)}
.bespoke-desc{font-size:14px;font-weight:300;color:rgba(250,246,240,.6);line-height:1.85;margin:20px 0 34px;max-width:390px}
.bespoke-steps{display:flex;flex-direction:column;gap:18px;margin-bottom:36px}
.bespoke-step{display:flex;align-items:center;gap:14px}
.step-n{width:32px;height:32px;border-radius:50%;border:1px solid var(--gold);color:var(--gold);
  font-family:'Cormorant Garamond',serif;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-t{font-size:13px;color:rgba(250,246,240,.72);font-weight:300}
.bespoke-img-wrap{position:relative}
.bespoke-img{width:100%;height:500px;object-fit:cover;border-radius:var(--r-lg)}
.bespoke-float{position:absolute;bottom:-16px;left:-20px;background:var(--gold);
  border-radius:var(--r-md);padding:16px 22px;width:200px;box-shadow:var(--sh-lg)}
.bespoke-float-t{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--dark);font-weight:600}
.bespoke-float-s{font-size:11px;color:rgba(26,43,28,.65);margin-top:2px}
@media(max-width:767px){.bespoke{grid-template-columns:1fr;gap:40px;padding:64px var(--px)}.bespoke-float{bottom:14px;left:14px}}

/* ══════════════════════════════════════════
   PROCESS
══════════════════════════════════════════ */
.proc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:56px;position:relative}
.proc-grid::before{content:'';position:absolute;top:36px;left:10%;right:10%;height:1px;background:var(--border);z-index:0}
.proc-item{text-align:center;padding:0 18px;position:relative;z-index:1}
.proc-n{width:72px;height:72px;border-radius:50%;background:white;border:1px solid var(--border);
  font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;color:var(--gold);
  display:flex;align-items:center;justify-content:center;margin:0 auto 20px;
  transition:background .3s,border-color .3s,color .3s}
.proc-item:hover .proc-n{background:var(--gold);color:white;border-color:var(--gold)}
.proc-title{font-size:14px;font-weight:600;color:var(--dark);margin-bottom:7px}
.proc-desc{font-size:12px;color:var(--muted);line-height:1.7}
@media(max-width:1024px){.proc-grid{grid-template-columns:repeat(2,1fr);row-gap:36px}.proc-grid::before{display:none}}
@media(max-width:767px){.proc-grid{grid-template-columns:1fr}}

/* ══════════════════════════════════════════
   REVIEWS
══════════════════════════════════════════ */
.rev-track{display:flex;gap:18px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.rev-track::-webkit-scrollbar{display:none}
.rev-card{background:white;border-radius:var(--r-lg);padding:28px;min-width:340px;flex-shrink:0;
  border:1px solid var(--border);box-shadow:var(--sh-sm)}
.rev-stars{color:var(--gold);font-size:12px;margin-bottom:14px;letter-spacing:2px}
.rev-q{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;font-style:italic;
  color:var(--dark);line-height:1.55;margin-bottom:20px}
.rev-author{display:flex;align-items:center;gap:10px}
.rev-avatar{width:38px;height:38px;border-radius:50%;object-fit:cover}
.rev-name{font-size:13px;font-weight:600;color:var(--dark)}
.rev-loc{font-size:11px;color:var(--muted);margin-top:1px}
@media(max-width:767px){.rev-card{min-width:82vw}}

/* ══════════════════════════════════════════
   NEWSLETTER
══════════════════════════════════════════ */

</head>
<body>
<div id="root"></div>
<div id="toast-root"></div>
<div id="cur"></div>
<div id="cur-r"></div>

<script type="text/babel">
const { useState, useLayoutEffect, useEffect, useRef, useCallback, createContext, useContext } = React;
gsap.registerPlugin(ScrollTrigger);

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MOTION CONFIG
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const M = {
  ease:{ out:'power2.out', expo:'expo.out', expoIO:'expo.inOut', el:'elastic.out(1,.45)' },
  dur:{ fast:.36, base:.65, slow:.9, film:1.2 },
};

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CART CONTEXT
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const CartCtx = createContext(null);
function CartProvider({ children }) {
  const [items, setItems] = useState([]);
  const [open, setOpen]   = useState(false);
  const add = useCallback((product) => {
    setItems(prev => {
      const ex = prev.find(i => i.name === product.name);
      if (ex) return prev.map(i => i.name === product.name ? {...i, qty: i.qty+1} : i);
      return [...prev, { ...product, qty: 1 }];
    });
    toast(`${product.name} added to cart`);
  }, []);
  const remove = useCallback((name) => setItems(prev => prev.filter(i => i.name !== name)), []);
  const total  = items.reduce((s,i) => s + (parseFloat(i.price.replace('$','')) * i.qty), 0);
  const count  = items.reduce((s,i) => s + i.qty, 0);
  return (
    <CartCtx.Provider value={{ items, open, setOpen, add, remove, total, count }}>
      {children}
    </CartCtx.Provider>
  );
}
const useCart = () => useContext(CartCtx);

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TOAST
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function toast(msg) {
  const root = document.getElementById('toast-root');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span class="toast-dot"></span>${msg}`;
  root.appendChild(el);
  gsap.to(el, { opacity:1, y:0, duration:M.dur.fast, ease:M.ease.expo });
  setTimeout(() => {
    gsap.to(el, { opacity:0, y:8, duration:M.dur.fast, ease:M.ease.out,
      onComplete: () => el.remove() });
  }, 2800);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HOOKS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function useReveal(scopeRef, fn) {
  useLayoutEffect(() => {
    const ctx = gsap.context(fn, scopeRef);
    return () => ctx.revert();
  }, []);
}
function useMag(ref, str=.22) {
  const onMove = (e) => {
    const r = ref.current.getBoundingClientRect();
    gsap.to(ref.current,{ x:(e.clientX-(r.left+r.width/2))*str, y:(e.clientY-(r.top+r.height/2))*str, duration:.4, ease:M.ease.out });
  };
  const onLeave = () => gsap.to(ref.current,{ x:0, y:0, duration:.55, ease:M.ease.el });
  return { onMouseMove:onMove, onMouseLeave:onLeave };
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   COMPONENTS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function MagBtn({ className, children, onClick }) {
  const ref = useRef(null);
  const mag = useMag(ref);
  return <button ref={ref} className={className} onClick={onClick} {...mag}>{children}</button>;
}

/* ── Cursor (hidden until first move) ── */
function Cursor() {
  const dotRef  = useRef(document.getElementById('cur'));
  const ringRef = useRef(document.getElementById('cur-r'));
  useLayoutEffect(() => {
    let mx=0,my=0,rx=0,ry=0,init=false;
    const onMove = ({ clientX:x, clientY:y }) => {
      mx=x; my=y;
      if (!init) {
        init=true;
        gsap.to([dotRef.current,ringRef.current],{ opacity:1, duration:.3 });
      }
      gsap.to(dotRef.current,{ x, y, duration:.08 });
    };
    document.addEventListener('mousemove', onMove);
    const tick = () => {
      rx+=(mx-rx)*.1; ry+=(my-ry)*.1;
      gsap.set(ringRef.current,{ x:rx, y:ry });
    };
    gsap.ticker.add(tick);
    return () => { document.removeEventListener('mousemove',onMove); gsap.ticker.remove(tick); };
  },[]);
  return null;
}

/* ── Cart Drawer ── */
function CartDrawer() {
  const { items, open, setOpen, remove, total, count } = useCart();
  const ref = useRef(null);
  return (
    <div className={`cart-overlay${open?' open':''}`} onClick={e => e.target===ref.current&&setOpen(false)} ref={ref}>
      <div className="cart-drawer">
        <div className="cart-head">
          <div className="cart-title">Your Basket {count>0&&<span style={{fontSize:14,color:'var(--gold)'}}>({count})</span>}</div>
          <button className="cart-close" onClick={()=>setOpen(false)}>×</button>
        </div>
        <div className="cart-body">
          {items.length===0 ? (
            <div className="cart-empty">
              <div className="cart-empty-icon">🌸</div>
              <div>Your basket is empty</div>
              <div style={{fontSize:12,marginTop:6,color:'var(--muted)'}}>Add some beautiful bouquets!</div>
            </div>
          ) : items.map(item => (
            <div key={item.name} className="cart-item">
              <img className="cart-item-img" src={`https://images.unsplash.com/${item.photo}?auto=format&fit=crop&q=80&w=200`} alt={item.name}/>
              <div className="cart-item-info">
                <div className="cart-item-tag">{item.tag}</div>
                <div className="cart-item-name">{item.name} {item.qty>1&&<span style={{color:'var(--gold)',fontSize:12}}>×{item.qty}</span>}</div>
                <div className="cart-item-price">{item.price}</div>
              </div>
              <button className="cart-item-remove" onClick={()=>remove(item.name)}>×</button>
            </div>
          ))}
        </div>
        {items.length>0&&(
          <div className="cart-foot">
            <div className="cart-total-row">
              <div className="cart-total-label">Total</div>
              <div className="cart-total-val">${total.toFixed(2)}</div>
            </div>
            <div className="cart-note">Free delivery on orders over $100 · Use code BLOOM10 for 10% off</div>
            <MagBtn className="btn-gold btn-full" onClick={()=>toast('Checkout coming soon — this is a demo!')}>Proceed to Checkout →</MagBtn>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Modal ── */
function Modal({ open, onClose, title, children }) {
  useEffect(() => {
    const fn = (e) => e.key==='Escape'&&onClose();
    document.addEventListener('keydown',fn);
    return ()=>document.removeEventListener('keydown',fn);
  },[onClose]);
  return (
    <div className={`modal-bg${open?' open':''}`} onClick={e=>e.currentTarget===e.target&&onClose()}>
      <div className="modal-box">
        <div className="modal-head">
          <h3>{title}</h3>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">{children}</div>
      </div>
    </div>
  );
}

/* ── Nav ── */
function Nav({ onPolicy, onTerms }) {
  const { count, setOpen } = useCart();
  const [scrolled, setScrolled] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const navRef  = useRef(null);
  const menuRef = useRef(null);
  useLayoutEffect(() => {
    gsap.from(navRef.current,{ y:-14, opacity:0, duration:M.dur.base, ease:M.ease.out, delay:.1 });
    const st = ScrollTrigger.create({ start:80,
      onEnter:()=>setScrolled(true), onLeaveBack:()=>setScrolled(false) });
    return ()=>st.kill();
  },[]);
  const openMenu = () => {
    setMenuOpen(true);
    gsap.set(menuRef.current,{visibility:'visible'});
    gsap.fromTo(menuRef.current,{x:'100%'},{x:'0%',duration:.46,ease:M.ease.expo});
  };
  const closeMenu = () => {
    gsap.to(menuRef.current,{x:'100%',duration:.36,ease:'power3.in',
      onComplete:()=>{gsap.set(menuRef.current,{visibility:'hidden'});setMenuOpen(false);}});
  };
  const LINKS = ['Home','Browse','Custom','About','Contact'];
  return (
    <>
      <nav ref={navRef} className={`nav${scrolled?' scrolled':''}`}>
        <a href="#" className="nav-logo">Bouquet<span>Studio</span></a>
        <ul className="nav-links">{LINKS.map(l=><li key={l}><a href="#">{l}</a></li>)}</ul>
        <div className="nav-actions">
          <button className="nav-cart-btn" onClick={()=>setOpen(true)}>
            <span className="cart-label">Cart</span>
            <span className="cart-count">{count}</span>
          </button>
          <MagBtn className="btn-nav">Login</MagBtn>
          <button className="hamburger" onClick={openMenu} aria-label="Open menu">
            <span/><span/><span/>
          </button>
        </div>
      </nav>
      <div ref={menuRef} className="mob-menu">
        <button className="mob-close" onClick={closeMenu}>×</button>
        <ul className="mob-links">{LINKS.map(l=><li key={l}><a href="#" onClick={closeMenu}>{l}</a></li>)}</ul>
        <div className="mob-cta"><MagBtn className="btn-gold" onClick={()=>{closeMenu();setOpen(true);}}>View Basket ({count})</MagBtn></div>
      </div>
    </>
  );
}

/* ── Hero ── */
function Hero() {
  const secRef = useRef(null);
  useLayoutEffect(() => {
    const mm = gsap.matchMedia();
    mm.add({ isDesktop:'(min-width:768px)', isMobile:'(max-width:767px)' }, ctx => {
      const { isDesktop } = ctx.conditions;
      const scope = gsap.context(() => {
        const tl = gsap.timeline({ delay:.3 });
        // ① FOCAL — title
        tl.from('.line-inner',{ yPercent:108, duration:M.dur.film, ease:M.ease.expo, stagger:.09 });
        // ② SUPPORTING — rest of left col
        tl.from(['.hero-eyebrow','.hero-desc','.hero-cta','.hero-stats'],
          { opacity:0, y:10, duration:M.dur.slow, ease:M.ease.out, stagger:.1 },'-=.9');
        // ③ Image reveal
        if (isDesktop) {
          gsap.from('.hero-img-frame',{ clipPath:'inset(0 100% 0 0 round 200px 200px 160px 160px)',
            duration:M.dur.film, ease:M.ease.expoIO, delay:.55 });
          gsap.from('.hero-img-frame img',{ scale:1.07, duration:1.7, ease:M.ease.out, delay:.55 });
          gsap.from(['.hero-badge','.hero-float-pill'],
            { opacity:0, duration:M.dur.slow, ease:M.ease.out, stagger:.12, delay:1.1 });
          // Parallax
          gsap.to('.hero-img-frame img',{ y:-38, ease:'none',
            scrollTrigger:{ trigger:secRef.current, start:'top top', end:'bottom top', scrub:1.4 }});
        } else {
          gsap.from('.hero-img-frame',{ opacity:0, y:16, duration:M.dur.base, ease:M.ease.out, delay:.7 });
        }
        // Counter
        document.querySelectorAll('[data-target]').forEach(el => {
          const target=+el.dataset.target;
          ScrollTrigger.create({ trigger:el, start:'top 88%', once:true,
            onEnter:()=>gsap.to({v:0},{v:target,duration:1.8,ease:'power2.out',
              onUpdate(){ el.textContent=Math.round(this.targets()[0].v).toLocaleString()+(target===98?'%':'+'); }}) });
        });
      }, secRef);
      return () => scope.revert();
    });
    // ③ AMBIENT — petals
    document.querySelectorAll('.hero-petal').forEach((el,i) => {
      gsap.to(el,{ y:-6-i*3, rotation:4-i*3, duration:3+i, repeat:-1, yoyo:true, ease:'sine.inOut', delay:i*.7 });
    });
    return ()=>mm.revert();
  },[]);
  return (
    <section ref={secRef} className="hero" id="hero">
      <div className="hero-orb"/>
      <div className="hero-left">
        <div className="hero-eyebrow">Handcrafted in Sydney, Australia</div>
        <h1 className="hero-title">
          <span className="line"><span className="line-inner">Elegance</span></span>
          <span className="line"><span className="line-inner">in <em>Every</em></span></span>
          <span className="line"><span className="line-inner">Bloom</span></span>
        </h1>
        <p className="hero-desc">Curated ribbon flower bouquets, hand‑crafted with artistic precision and delivered fresh to your doorstep across Australia.</p>
        <div className="hero-cta">
          <MagBtn className="btn-primary"><span>Explore Collection</span></MagBtn>
          <button className="btn-outline">Our Story</button>
        </div>
        <div className="hero-stats">
          <div><div className="stat-num" data-target="2400">0</div><div className="stat-lbl">Bouquets Delivered</div></div>
          <div><div className="stat-num" data-target="98">0</div><div className="stat-lbl">% Happy Customers</div></div>
          <div><div className="stat-num" data-target="5">0</div><div className="stat-lbl">Years of Craft</div></div>
        </div>
      </div>
      <div className="hero-right">
        <div style={{position:'relative'}}>
          <div className="hero-img-frame">
            <img src="https://images.unsplash.com/photo-1526047932273-341f2a7631f9?auto=format&fit=crop&q=80&w=700" alt="Premium handcrafted ribbon bouquet"/>
          </div>
          <div className="hero-badge">
            <div className="hero-badge-label">⭐ Top Rated</div>
            <div className="hero-badge-sub">Same‑day delivery</div>
          </div>
          <div className="hero-float-pill">🌸 <span>100%</span> Handmade in Sydney</div>
          <div className="hero-petal" style={{top:'8%',left:'-8%'}}>🌸</div>
          <div className="hero-petal" style={{bottom:'18%',right:'-6%'}}>🌺</div>
        </div>
      </div>
    </section>
  );
}

/* ── Ribbon ── */
const RI = ['Handcrafted Bouquets','Same‑Day Delivery','Ribbon Florals','Everlasting Beauty','Custom Orders','Across Australia'];
function Ribbon() {
  const ref = useRef(null);
  useLayoutEffect(() => {
    requestAnimationFrame(() => {
      const w = ref.current.scrollWidth/2;
      gsap.to(ref.current,{ x:-w, duration:25, repeat:-1, ease:'linear' });
    });
  },[]);
  return (
    <div className="ribbon">

  };
  return (
    <div className="newsletter">

      <div style={{flexShrink:0,width:'100%',maxWidth:440}}>
        {!sent ? (
          <div>
            <div className="nl-form">
              <input className="nl-input" type="email" placeholder="your@email.com"
                value={email} onChange={e=>setEmail(e.target.value)}

            </div>
            <div style={{fontSize:11,color:'var(--muted)',marginTop:10}}>No spam, unsubscribe any time. By subscribing you agree to our Privacy Policy.</div>

            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:'var(--dark)',marginBottom:6}}>You're in the garden!</div>

    </div>
  );
}
