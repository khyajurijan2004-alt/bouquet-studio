<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bouquet Studio — Handcrafted Ribbon Flowers</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════ */
:root {
  --cream:        #faf6f0;
  --cream2:       #f2ece2;
  --dark:         #1a2b1c;
  --dark2:        #111a12;
  --gold:         #c4973a;
  --gold-light:   #e8d5a3;
  --blush:        #deb8b0;
  --blush-light:  #f5e8e4;
  --text:         #2c2c2a;
  --muted:        #7a7060;
  --border:       rgba(196,151,58,0.2);
  --border-dark:  rgba(196,151,58,0.15);

  --shadow-sm:  0 1px 4px rgba(0,0,0,0.05);
  --shadow-md:  0 4px 24px rgba(0,0,0,0.07);
  --shadow-lg:  0 16px 56px rgba(0,0,0,0.11);
  --shadow-xl:  0 32px 80px rgba(0,0,0,0.15);

  --radius-sm:  12px;
  --radius-md:  20px;
  --radius-lg:  28px;
  --radius-pill: 100px;

  --px: 64px;
  --py: 104px;
  --nav-h: 80px;
}
@media (max-width: 1024px) { :root { --px: 40px; --py: 88px; } }
@media (max-width: 767px)  { :root { --px: 22px; --py: 72px; --nav-h: 64px; } }

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
img  { display: block; max-width: 100%; }
button { font-family: inherit; }
ul { list-style: none; }
a { text-decoration: none; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--cream);
  color: var(--text);
  overflow-x: hidden;
}
@media (hover: hover) { body { cursor: none; } }

/* ═══════════════════════════════════════════
   GRAIN OVERLAY  (texture depth)
═══════════════════════════════════════════ */
.grain {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 9988;
  opacity: 0.038;
  background-size: 220px 220px;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ═══════════════════════════════════════════
   CURSOR
═══════════════════════════════════════════ */
#cursor, #cursor-ring {
  position: fixed; top: 0; left: 0;
  pointer-events: none; border-radius: 50%;
  transform: translate(-50%,-50%);
}
#cursor {
  width: 8px; height: 8px;
  background: var(--gold); z-index: 9999;
  transition: width .18s, height .18s, background .18s;
}
#cursor-ring {
  width: 32px; height: 32px;
  border: 1.5px solid var(--gold);
  z-index: 9998; opacity: 0.5;
}
body:has(a:hover) #cursor,
body:has(button:hover) #cursor {
  width: 36px; height: 36px; background: var(--blush);
}
@media (hover: none) { #cursor, #cursor-ring { display: none; } }

/* ═══════════════════════════════════════════
   NAV
═══════════════════════════════════════════ */
.nav {
  position: fixed; inset: 0 0 auto 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  height: var(--nav-h); padding: 0 var(--px);
  transition: background .45s, border-color .45s, backdrop-filter .45s;
}
.nav.is-scrolled {
  background: rgba(250,246,240,0.9);
  backdrop-filter: blur(18px) saturate(1.4);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 21px; font-weight: 600; letter-spacing: .08em; color: var(--dark);
}
.nav-logo span { color: var(--gold); }
.nav-links {
  display: flex; gap: 34px;
}
.nav-links a {
  font-size: 12px; font-weight: 500; letter-spacing: .12em;
  text-transform: uppercase; color: var(--text); opacity: .65;
  transition: opacity .2s, color .2s;
}
.nav-links a:hover { opacity: 1; color: var(--gold); }
.nav-actions { display: flex; gap: 14px; align-items: center; }
.nav-cart {
  font-size: 12px; font-weight: 500; letter-spacing: .08em;
  color: var(--text); opacity: .6;
}
.btn-nav {
  background: var(--dark); color: var(--cream); border: none;
  border-radius: var(--radius-pill); padding: 9px 22px;
  font-size: 11px; font-weight: 600; letter-spacing: .11em;
  text-transform: uppercase; cursor: none;
  transition: background .25s;
}
.btn-nav:hover { background: var(--gold); }
/* Hamburger */
.hamburger {
  display: none; flex-direction: column; gap: 5px;
  background: none; border: none; cursor: pointer; padding: 4px;
}
.hamburger span {
  display: block; width: 22px; height: 1.5px;
  background: var(--dark); border-radius: 2px;
  transition: opacity .2s;
}
/* Mobile menu overlay */
.mobile-menu {
  position: fixed; inset: 0; z-index: 150;
  background: var(--dark);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  transform: translateX(100%); visibility: hidden;
}
.mobile-menu-close {
  position: absolute; top: 22px; right: var(--px);
  background: none; border: none; cursor: pointer;
  font-size: 28px; color: rgba(250,246,240,.5);
  line-height: 1;
}
.mobile-links { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.mobile-links a {
  font-family: 'Cormorant Garamond', serif;
  font-size: 36px; font-weight: 300; font-style: italic;
  color: var(--cream); opacity: .7;
  transition: opacity .2s, color .2s;
}
.mobile-links a:hover { opacity: 1; color: var(--gold); }
.mobile-cta { margin-top: 28px; }
@media (max-width: 767px) {
  .nav-links, .nav-cart, .btn-nav { display: none; }
  .hamburger { display: flex; }
}

/* ═══════════════════════════════════════════
   HERO
═══════════════════════════════════════════ */
.hero {
  min-height: 100vh;
  display: grid; grid-template-columns: 1fr 1fr;
  align-items: center;
  padding: calc(var(--nav-h) + 40px) var(--px) 80px;
  position: relative; overflow: hidden;
}
.hero-bg-orb {
  position: absolute; right: -80px; top: 50%;
  transform: translateY(-50%);
  width: 680px; height: 680px;
  background: radial-gradient(ellipse, var(--blush-light) 0%, transparent 68%);
  border-radius: 50%; pointer-events: none;
}
.hero-left { position: relative; z-index: 2; max-width: 560px; }
.hero-eyebrow {
  display: flex; align-items: center; gap: 12px;
  font-size: 10px; font-weight: 600; letter-spacing: .22em;
  text-transform: uppercase; color: var(--gold);
  margin-bottom: 26px;
}
.hero-eyebrow::before { content: ''; width: 36px; height: 1px; background: var(--gold); }
/* Text reveal lines */
.line { overflow: hidden; display: block; }
.line-inner { display: block; }
.hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(54px, 5.8vw, 82px);
  font-weight: 300; line-height: 1.06;
  color: var(--dark); margin-bottom: 26px;
}
.hero-title em { font-style: italic; color: var(--gold); }
.hero-desc {
  font-size: 15px; font-weight: 300; color: var(--muted);
  line-height: 1.85; max-width: 370px; margin-bottom: 40px;
}
.hero-cta { display: flex; gap: 14px; align-items: center; }
.hero-stats {
  display: flex; gap: 36px;
  margin-top: 52px; padding-top: 36px;
  border-top: 1px solid var(--border);
}
.stat-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 34px; font-weight: 400; color: var(--dark); line-height: 1;
}
.stat-label {
  font-size: 10px; color: var(--muted); letter-spacing: .1em;
  text-transform: uppercase; margin-top: 5px;
}
/* Hero right */
.hero-right {
  position: relative; z-index: 2;
  display: flex; align-items: center; justify-content: center;
}
.hero-img-wrap { position: relative; width: 460px; height: 560px; }
.hero-img-main-clip {
  width: 340px; height: 460px;
  border-radius: 180px 180px 160px 160px;
  overflow: hidden;
  margin: 0 auto; position: relative; z-index: 2;
}
.hero-img-main {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center top;
  transform-origin: center;
}
.hero-img-accent {
  width: 160px; height: 200px;
  border-radius: 100px;
  object-fit: cover; object-position: top;
  position: absolute; bottom: 20px; right: 0;
  border: 3px solid var(--cream); z-index: 3;
  box-shadow: var(--shadow-md);
}
.hero-badge {
  position: absolute; top: 28px; left: 0;
  background: white; border-radius: var(--radius-sm);
  padding: 14px 18px; box-shadow: var(--shadow-lg); z-index: 4;
}
.hero-badge-text { font-size: 10px; font-weight: 600; letter-spacing: .12em; color: var(--gold); text-transform: uppercase; }
.hero-badge-sub  { font-size: 12px; color: var(--text); margin-top: 3px; }
.hero-petal {
  position: absolute; font-size: 34px;
  pointer-events: none; opacity: .5;
}
@media (max-width: 1024px) {
  .hero { gap: 40px; }
  .hero-img-wrap { width: 380px; height: 480px; }
}
@media (max-width: 767px) {
  .hero { grid-template-columns: 1fr; min-height: auto; padding-bottom: 60px; }
  .hero-right { justify-content: flex-start; margin-top: 40px; }
  .hero-img-wrap { width: 100%; height: 360px; }
  .hero-img-main-clip { width: 260px; height: 340px; }
  .hero-stats { gap: 24px; }
}

/* ═══════════════════════════════════════════
   RIBBON  (Marquee)
═══════════════════════════════════════════ */
.ribbon {
  background: var(--dark);
  padding: 17px 0; overflow: hidden;
  border-top: 1px solid var(--border-dark);
  border-bottom: 1px solid var(--border-dark);
}
.ribbon-track { display: flex; white-space: nowrap; }
.ribbon-item {
  display: flex; align-items: center; gap: 18px; padding: 0 28px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px; font-weight: 400; font-style: italic;
  color: var(--gold-light); letter-spacing: .05em;
}
.ribbon-dot { width: 4px; height: 4px; background: var(--gold); border-radius: 50%; flex-shrink: 0; }

/* ═══════════════════════════════════════════
   FEATURES STRIP
═══════════════════════════════════════════ */
.features-strip {
  background: var(--cream2);
  display: grid; grid-template-columns: repeat(3,1fr);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.feature-item {
  padding: 44px var(--px);
  display: flex; align-items: flex-start; gap: 18px;
  border-right: 1px solid var(--border);
}
.feature-item:last-child { border-right: none; }
.feature-icon {
  font-size: 24px; flex-shrink: 0;
  width: 50px; height: 50px; background: white;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-sm);
}
.feature-title { font-size: 14px; font-weight: 600; color: var(--dark); margin-bottom: 5px; }
.feature-desc  { font-size: 12.5px; font-weight: 300; color: var(--muted); line-height: 1.7; }
@media (max-width: 1024px) {
  .features-strip { grid-template-columns: 1fr; }
  .feature-item { border-right: none; border-bottom: 1px solid var(--border); padding: 32px var(--px); }
  .feature-item:last-child { border-bottom: none; }
}

/* ═══════════════════════════════════════════
   SHARED SECTION ATOMS
═══════════════════════════════════════════ */
.section { padding: var(--py) var(--px); }
.eyebrow {
  display: flex; align-items: center; gap: 12px;
  font-size: 10px; font-weight: 600; letter-spacing: .22em;
  text-transform: uppercase; color: var(--gold); margin-bottom: 14px;
}
.eyebrow::before { content: ''; width: 28px; height: 1px; background: var(--gold); }
.eyebrow.light { color: var(--gold-light); }
.eyebrow.light::before { background: var(--gold-light); }
.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(36px, 4vw, 54px);
  font-weight: 300; line-height: 1.1; color: var(--dark);
}
.section-title em { font-style: italic; color: var(--gold); }
.section-title.light { color: var(--cream); }

/* ═══════════════════════════════════════════
   COLLECTION  (Bouquets grid)
═══════════════════════════════════════════ */
.collection-head {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 52px;
}
.collection-grid {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 24px;
}
.card {
  background: white; border-radius: var(--radius-lg);
  overflow: hidden; position: relative;
  box-shadow: var(--shadow-sm);
  transition: box-shadow .4s var(--ease-out), transform .4s var(--ease-out);
}
.card:hover {
  box-shadow: var(--shadow-xl);
  transform: translateY(-5px);
}
.card-img-shell { overflow: hidden; }
.card-img {
  width: 100%; height: 268px; object-fit: cover;
  transition: transform .55s cubic-bezier(.25,.46,.45,.94);
}
.card:hover .card-img { transform: scale(1.05); }
.card-body { padding: 20px 22px 24px; }
.card-tag {
  font-size: 9.5px; font-weight: 600; letter-spacing: .16em;
  text-transform: uppercase; color: var(--gold); margin-bottom: 6px;
}
.card-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; font-weight: 400; color: var(--dark); margin-bottom: 7px;
}
.card-desc { font-size: 12.5px; color: var(--muted); line-height: 1.65; margin-bottom: 16px; }
.card-foot { display: flex; justify-content: space-between; align-items: center; }
.card-price {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; font-weight: 600; color: var(--dark);
}
.card-badge {
  position: absolute; top: 14px; left: 14px;
  background: var(--dark); color: var(--cream);
  font-size: 9px; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; padding: 5px 11px;
  border-radius: var(--radius-pill);
}
@media (max-width: 1024px) { .collection-grid { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 767px)  {
  .collection-grid { grid-template-columns: 1fr; }
  .collection-head { flex-direction: column; align-items: flex-start; gap: 16px; }
}

/* ═══════════════════════════════════════════
   BESPOKE  (dark custom section)
═══════════════════════════════════════════ */
.bespoke {
  background: var(--dark);
  display: grid; grid-template-columns: 1fr 1fr;
  align-items: center; gap: 72px;
  padding: 112px var(--px);
}
.bespoke-desc {
  font-size: 14.5px; font-weight: 300;
  color: rgba(250,246,240,.62); line-height: 1.85;
  margin: 22px 0 38px; max-width: 400px;
}
.bespoke-steps { display: flex; flex-direction: column; gap: 20px; margin-bottom: 40px; }
.bespoke-step  { display: flex; align-items: center; gap: 14px; }
.step-num {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid var(--gold); color: var(--gold);
  font-family: 'Cormorant Garamond', serif; font-size: 15px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.step-text { font-size: 13.5px; color: rgba(250,246,240,.75); font-weight: 300; }
.bespoke-img-wrap { position: relative; }
.bespoke-img {
  width: 100%; height: 520px;
  object-fit: cover; border-radius: var(--radius-lg);
}
.bespoke-float {
  position: absolute; bottom: -18px; left: -24px;
  background: var(--gold); border-radius: var(--radius-md);
  padding: 18px 24px; width: 210px;
  box-shadow: var(--shadow-lg);
}
.bespoke-float-title { font-family: 'Cormorant Garamond', serif; font-size: 17px; color: var(--dark); font-weight: 600; }
.bespoke-float-sub   { font-size: 11.5px; color: rgba(26,43,28,.65); margin-top: 3px; }
@media (max-width: 767px) {
  .bespoke { grid-template-columns: 1fr; gap: 40px; padding: 72px var(--px); }
  .bespoke-float { bottom: 16px; left: 16px; }
}

/* ═══════════════════════════════════════════
   PROCESS  (How it works)
═══════════════════════════════════════════ */
.process-grid {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 0; margin-top: 60px; position: relative;
}
.process-grid::before {
  content: ''; position: absolute;
  top: 38px; left: 10%; right: 10%;
  height: 1px; background: var(--border); z-index: 0;
}
.process-item { text-align: center; padding: 0 20px; position: relative; z-index: 1; }
.process-num {
  width: 76px; height: 76px; border-radius: 50%;
  background: white; border: 1px solid var(--border);
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px; font-weight: 400; color: var(--gold);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 22px;
  transition: background .3s, border-color .3s, color .3s;
}
.process-item:hover .process-num { background: var(--gold); color: white; border-color: var(--gold); }
.process-title { font-size: 15px; font-weight: 600; color: var(--dark); margin-bottom: 8px; }
.process-desc  { font-size: 12.5px; color: var(--muted); line-height: 1.7; }
@media (max-width: 1024px) {
  .process-grid { grid-template-columns: repeat(2,1fr); row-gap: 40px; }
  .process-grid::before { display: none; }
}
@media (max-width: 767px) {
  .process-grid { grid-template-columns: 1fr; }
}

/* ═══════════════════════════════════════════
   REVIEWS  (Testimonials)
═══════════════════════════════════════════ */
.reviews-track {
  display: flex; gap: 20px;
  overflow-x: auto; padding-bottom: 4px;
  scrollbar-width: none;
}
.reviews-track::-webkit-scrollbar { display: none; }
.review-card {
  background: white; border-radius: var(--radius-lg);
  padding: 32px; min-width: 360px; flex-shrink: 0;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.review-stars { color: var(--gold); font-size: 13px; margin-bottom: 16px; letter-spacing: 2px; }
.review-quote {
  font-family: 'Cormorant Garamond', serif;
  font-size: 19px; font-weight: 400; font-style: italic;
  color: var(--dark); line-height: 1.55; margin-bottom: 22px;
}
.review-author { display: flex; align-items: center; gap: 11px; }
.review-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
.review-name   { font-size: 13px; font-weight: 600; color: var(--dark); }
.review-loc    { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
@media (max-width: 767px) {
  .review-card { min-width: 80vw; }
}

/* ═══════════════════════════════════════════
   OFFER  (CTA)
═══════════════════════════════════════════ */
.offer {
  background: linear-gradient(140deg, #1a2b1c 0%, #243d26 55%, #1a2b1c 100%);
  text-align: center; padding: 112px var(--px);
  position: relative; overflow: hidden;
}
.offer-orb {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 560px; height: 560px;
  background: radial-gradient(ellipse, rgba(196,151,58,.13) 0%, transparent 68%);
  border-radius: 50%; pointer-events: none;
}
.offer-eyebrow { justify-content: center; }
.offer-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(40px, 5vw, 62px); font-weight: 300;
  color: var(--cream); line-height: 1.08; margin-bottom: 18px;
}
.offer-title em { color: var(--gold); font-style: italic; }
.offer-desc { font-size: 14.5px; color: rgba(250,246,240,.55); margin-bottom: 40px; }
.offer-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }

/* ═══════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════ */
.footer { background: var(--dark2); padding: 72px var(--px) 36px; }
.footer-top {
  display: grid; grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 52px; padding-bottom: 52px;
  border-bottom: 1px solid rgba(255,255,255,.07);
}
.footer-brand p { font-size: 12.5px; color: rgba(250,246,240,.4); line-height: 1.85; max-width: 240px; margin-top: 14px; }
.footer-col h4 { font-size: 11px; font-weight: 600; letter-spacing: .15em; text-transform: uppercase; color: var(--gold-light); margin-bottom: 18px; }
.footer-col ul { display: flex; flex-direction: column; gap: 9px; }
.footer-col a  { font-size: 12.5px; color: rgba(250,246,240,.38); transition: color .2s; }
.footer-col a:hover { color: var(--gold-light); }
.footer-bottom {

</head>
<body>
<div id="root"></div>

<script type="text/babel">
/*
 * ─────────────────────────────────────────────────────────
 * Architecture mirrors:
 *   src/
 *    ├── motion/config.js
 *    ├── hooks/useReveal.js
 *    ├── hooks/useParallax.js
 *    ├── components/ui/MagButton.jsx
 *    ├── components/Cursor.jsx
 *    ├── sections/{Nav,Hero,Ribbon,Features,
 *    │           Collection,Bespoke,Process,
 *    │           Reviews,Offer,Footer}.jsx
 *    └── App.jsx
 * ─────────────────────────────────────────────────────────
 */

const { useState, useLayoutEffect, useRef } = React;
gsap.registerPlugin(ScrollTrigger);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// motion/config.js  — single source of truth
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const M = {
  ease: {
    smooth:   'power2.out',
    expo:     'expo.out',
    expoIn:   'expo.inOut',
    elastic:  'elastic.out(1, 0.45)',
  },
  dur: {
    fast:      0.38,
    base:      0.68,
    slow:      0.92,
    cinematic: 1.25,
  },
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// hooks/useReveal.js
// Scope-safe scroll reveal via gsap.context
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function useReveal(scopeRef, fn) {
  useLayoutEffect(() => {
    const ctx = gsap.context(fn, scopeRef);
    return () => ctx.revert();
  }, []);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// hooks/useParallax.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function useParallax(elRef, triggerRef, yAmount = 36) {
  useLayoutEffect(() => {
    const ctx = gsap.context(() => {
      gsap.to(elRef.current, {
        y: -yAmount, ease: 'none',
        scrollTrigger: {
          trigger: triggerRef.current,
          start: 'top bottom', end: 'bottom top', scrub: 1.6,
        },
      });
    });
    return () => ctx.revert();
  }, []);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// components/ui/MagButton.jsx
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function MagButton({ className, children, strength = 0.22 }) {
  const ref = useRef(null);
  const onMove = (e) => {
    const r  = ref.current.getBoundingClientRect();
    const dx = (e.clientX - (r.left + r.width  / 2)) * strength;
    const dy = (e.clientY - (r.top  + r.height / 2)) * strength;
    gsap.to(ref.current, { x: dx, y: dy, duration: 0.42, ease: M.ease.smooth });
  };
  const onLeave = () =>
    gsap.to(ref.current, { x: 0, y: 0, duration: 0.55, ease: M.ease.elastic });
  return (
    <button ref={ref} className={className} onMouseMove={onMove} onMouseLeave={onLeave}>
      {children}
    </button>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// components/Cursor.jsx
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Cursor() {
  const dotRef  = useRef(null);
  const ringRef = useRef(null);
  useLayoutEffect(() => {
    let mx = 0, my = 0, rx = 0, ry = 0;
    const onMove = ({ clientX: x, clientY: y }) => {
      mx = x; my = y;
      gsap.to(dotRef.current, { x, y, duration: 0.08 });
    };
    document.addEventListener('mousemove', onMove);
    const tick = () => {
      rx += (mx - rx) * 0.11; ry += (my - ry) * 0.11;
      gsap.set(ringRef.current, { x: rx, y: ry });
    };
    gsap.ticker.add(tick);
    return () => { document.removeEventListener('mousemove', onMove); gsap.ticker.remove(tick); };
  }, []);
  return (
    <>
      <div id="cursor"      ref={dotRef}  />
      <div id="cursor-ring" ref={ringRef} />
    </>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// sections/Nav.jsx
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Nav() {
  const [scrolled, setScrolled] = useState(false);
  const navRef  = useRef(null);
  const menuRef = useRef(null);

  useLayoutEffect(() => {
    // Entrance — uses ref directly, no selector scope needed
    gsap.from(navRef.current, {
      y: -14, opacity: 0,
      duration: M.dur.base, ease: M.ease.smooth, delay: 0.1,
    });
    const st = ScrollTrigger.create({
      start: 80,
      onEnter:     () => setScrolled(true),
      onLeaveBack: () => setScrolled(false),
    });
    return () => st.kill();
  }, []);

  const openMenu = () => {
    gsap.set(menuRef.current, { visibility: 'visible' });
    gsap.fromTo(menuRef.current, { x: '100%' }, { x: '0%', duration: 0.48, ease: M.ease.expo });
  };
  const closeMenu = () => {
    gsap.to(menuRef.current, {
      x: '100%', duration: 0.38, ease: 'power3.in',
      onComplete: () => gsap.set(menuRef.current, { visibility: 'hidden' }),
    });
  };
  const LINKS = ['Home', 'Browse', 'Custom', 'About', 'Contact'];

  return (
    <>
      <nav ref={navRef} className={`nav${scrolled ? ' is-scrolled' : ''}`}>
        <a href="#" className="nav-logo">Bouquet<span>Studio</span></a>
        <ul className="nav-links">
          {LINKS.map(l => <li key={l}><a href="#">{l}</a></li>)}
        </ul>
        <div className="nav-actions">
          <a href="#" className="nav-cart">Cart (0)</a>
          <MagButton className="btn-nav">Login</MagButton>
          <button className="hamburger" onClick={openMenu} aria-label="Open menu">
            <span/><span/><span/>
          </button>
        </div>
      </nav>

      <div ref={menuRef} className="mobile-menu">
        <button className="mobile-menu-close" onClick={closeMenu}>×</button>
        <ul className="mobile-links">
          {LINKS.map(l => <li key={l}><a href="#" onClick={closeMenu}>{l}</a></li>)}
        </ul>
        <div className="mobile-cta">
          <MagButton className="btn-gold">Shop Now</MagButton>
        </div>
      </div>
    </>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// sections/Hero.jsx
// Motion rule: 1 focal · 1 supporting · 1 ambient
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Hero() {
  const sectionRef = useRef(null);

  useLayoutEffect(() => {
    const mm = gsap.matchMedia();

    // Shared between breakpoints
    const sharedTimeline = (ctx) => {
      const tl = gsap.timeline({ delay: 0.28 });

      // ① FOCAL — title line clip reveal
      tl.from('.line-inner', {
        yPercent: 108,
        duration: M.dur.cinematic,
        ease: M.ease.expo,
        stagger: 0.09,
      });

      // ② SUPPORTING — hero sub-content fade
      tl.from(['.hero-eyebrow', '.hero-desc', '.hero-cta', '.hero-stats'], {
        opacity: 0, y: 10,
        duration: M.dur.slow, ease: M.ease.smooth, stagger: 0.1,
      }, '-=0.9');

      // Stat counters
      document.querySelectorAll('[data-target]').forEach(el => {
        const target = +el.dataset.target;
        ScrollTrigger.create({
          trigger: el, start: 'top 88%', once: true,
          onEnter: () => gsap.to({ v: 0 }, {
            v: target, duration: 1.8, ease: 'power2.out',
            onUpdate() {
              el.textContent = Math.round(this.targets()[0].v).toLocaleString()
                + (target === 98 ? '%' : '+');
            },
          }),
        });
      });
    };

    // ③ AMBIENT — petals (very restrained)
    document.querySelectorAll('.hero-petal').forEach((el, i) => {
      gsap.to(el, {
        y: -7 - i * 3, rotation: 5 - i * 3,
        duration: 3.2 + i, repeat: -1, yoyo: true,
        ease: 'sine.inOut', delay: i * 0.6,
      });
    });

    mm.add({
      isDesktop: '(min-width: 768px)',
      isMobile:  '(max-width: 767px)',
    }, (ctx) => {
      const { isDesktop } = ctx.conditions;
      const scope = gsap.context(() => {
        sharedTimeline(scope);

        // Desktop: cinematic image clip-reveal
        if (isDesktop) {
          gsap.from('.hero-img-main-clip', {
            clipPath: 'inset(0 100% 0 0)',
            duration: M.dur.cinematic,
            ease: M.ease.expoIn,
            delay: 0.55,
          });
          gsap.from('.hero-img-main', {
            scale: 1.08, duration: 1.8, ease: M.ease.smooth, delay: 0.55,
          });
          // Accent & badge subtle entrance
          gsap.from(['.hero-img-accent', '.hero-badge'], {
            opacity: 0, duration: M.dur.slow, ease: M.ease.smooth,
            stagger: 0.12, delay: 1.1,
          });
          // Hero parallax
          gsap.to('.hero-img-main', {
            y: -42, ease: 'none',
            scrollTrigger: {
              trigger: sectionRef.current,
              start: 'top top', end: 'bottom top', scrub: 1.4,
            },
          });
        } else {
          // Mobile: simple fade
          gsap.from('.hero-img-main-clip', {
            opacity: 0, y: 18, duration: M.dur.base, ease: M.ease.smooth, delay: 0.7,
          });
        }
      }, sectionRef);
      return () => scope.revert();
    });

    return () => mm.revert();
  }, []);

  return (
    <section ref={sectionRef} className="hero" id="hero">
      <div className="hero-bg-orb" />
      <div className="hero-left">
        <div className="hero-eyebrow">Handcrafted in Sydney</div>
        <h1 className="hero-title">
          <span className="line"><span className="line-inner">Elegance</span></span>
          <span className="line"><span className="line-inner">in <em>Every</em></span></span>
          <span className="line"><span className="line-inner">Bloom</span></span>
        </h1>
        <p className="hero-desc">
          Curated ribbon flower bouquets, hand-crafted with artistic precision
          and delivered fresh to your doorstep across Australia.
        </p>
        <div className="hero-cta">
          <MagButton className="btn-primary"><span>Explore Collection</span></MagButton>
          <button className="btn-outline">Our Story</button>
        </div>
        <div className="hero-stats">
          <div><div className="stat-num" data-target="2400">0</div><div className="stat-label">Bouquets Delivered</div></div>
          <div><div className="stat-num" data-target="98">0</div><div className="stat-label">% Happy Customers</div></div>
          <div><div className="stat-num" data-target="5">0</div><div className="stat-label">Years of Craft</div></div>
        </div>
      </div>

      <div className="hero-right">
        <div className="hero-img-wrap">
          <div className="hero-img-main-clip">
            <img className="hero-img-main"
              src="https://images.unsplash.com/photo-1526047932273-341f2a7631f9?auto=format&fit=crop&q=80&w=700"
              alt="Premium bridal bouquet" />
          </div>
          <img className="hero-img-accent"
            src="https://images.unsplash.com/photo-1487530811015-780870d5ac4c?auto=format&fit=crop&q=80&w=400"
            alt="Ribbon detail" />
          <div className="hero-badge">
            <div className="hero-badge-text">⭐ Top Rated</div>
            <div className="hero-badge-sub">Same-day delivery</div>
          </div>
          <div className="hero-petal" style={{top:'10%',left:'4%'}}>🌸</div>
          <div className="hero-petal" style={{top:'58%',left:'82%'}}>🌺</div>
          <div className="hero-petal" style={{bottom:'14%',left:'8%'}}>🌼</div>
        </div>
      </div>
    </section>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// sections/Ribbon.jsx  (Marquee)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const RIBBON_ITEMS = ['Handcrafted Bouquets','Same-Day Delivery','Ribbon Florals','Everlasting Beauty','Custom Orders','Across Australia'];
function Ribbon() {
  const trackRef = useRef(null);
  useLayoutEffect(() => {
    requestAnimationFrame(() => {
      const w = trackRef.current.scrollWidth / 2;
      gsap.to(trackRef.current, { x: -w, duration: 26, repeat: -1, ease: 'linear' });
    });
  }, []);
  const items = [...RIBBON_ITEMS, ...RIBBON_ITEMS];
  return (
    <div className="ribbon">
      <div className="ribbon-track" ref={trackRef}>
        {items.map((item, i) => (
          <div key={i} className="ribbon-item">
            {item} <span className="ribbon-dot" />
          </div>
        ))}
      </div>
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// sections/Features.jsx
// Motion rule: section reveals as ONE unit
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const FEATURES = [
  { icon: '🌸', title: 'Everlasting Blooms', desc: 'Ribbon flowers that never wilt — a timeless keepsake for any occasion.' },
  { icon: '🚀', title: 'Same-Day Delivery',  desc: 'Order before noon for same-day delivery in Sydney, Melbourne & Brisbane.' },
  { icon: '✨', title: 'Fully Customisable', desc: 'Choose your ribbon palette, flower count, and luxury wrapping.' },
];
function Features() {
  const ref = useRef(null);
  useReveal(ref, () => {
    gsap.from('.feature-item', {
      opacity: 0, x: -18, duration: M.dur.slow,
      ease: M.ease.smooth, stagger: 0.13,
      scrollTrigger: { trigger: ref.current, start: 'top 86%' },
    });
  });
  return (
    <div ref={ref} className="features-strip">
      {FEATURES.map(f => (
        <div key={f.title} className="feature-item">
          <div className="feature-icon">{f.icon}</div>
          <div>
            <div className="feature-title">{f.title}</div>
            <div className="feature-desc">{f.desc}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// sections/Collection.jsx
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const BOUQUETS = [
  { badge: 'Bestseller', photo: 'photo-1490750967868-88df5691cc3a', tag: 'Bridal',      name: 'The Classic Romantic', desc: 'Soft blush roses with pearl ribbon, nestled in ivory silk wrap.',           price: '$89'  },
  { badge: null,         photo: 'photo-1548094990-c16ca90f1f0d', tag: 'Everyday',    name: 'Sunrise Bloom',         desc: 'Warm amber and peach florals wrapped in gold satin ribbon.',              price: '$65'  },
  { badge: 'New',        photo: 'photo-1455659817273-f96807779a8a', tag: 'Luxury',    name: 'Midnight Garden',       desc: 'Deep burgundy and forest green with velvet ribbon accents.',              price: '$120' },
  { badge: null,         photo: 'photo-1508610048659-a06b669e3321', tag: 'Birthday',  name: 'Pastel Dreams',         desc: 'Lavender, lilac and soft pink — a dreamy spring arrangement.',            price: '$75'  },
  { badge: null,         photo: 'photo-1561181286-d3fee7d55364', tag: 'Anniversary', name: 'Golden Hour',           desc: 'Sunflowers and white dahlias with warm golden bow wrapping.',             price: '$95'  },
  { badge: 'Limited',    photo: 'photo-1557367184-663b94d7193f', tag: 'Wedding',     name: 'Garden Symphony',       desc: 'A grand arrangement with peonies, hydrangeas, and lace ribbon.',          price: '$150' },
];
function Collection() {
  const ref = useRef(null);
  useReveal(ref, () => {
    // ① FOCAL: header reveal
    gsap.from('.collection-head', {
      opacity: 0, y: 18, duration: M.dur.slow, ease: M.ease.smooth,
      scrollTrigger: { trigger: '.collection-head', start: 'top 85%' },
    });
    // ② SUPPORTING: cards subtle stagger
    gsap.from('.card', {
      opacity: 0, y: 18, duration: M.dur.base, ease: M.ease.smooth, stagger: 0.07,
      scrollTrigger: { trigger: '.collection-grid', start: 'top 82%' },
    });
  });
  return (
    <section ref={ref} className="section" style={{ background: 'var(--cream)' }}>
      <div className="collection-head">
        <div>
          <div className="eyebrow">Our Collections</div>
          <h2 className="section-title">Curated <em>Florals</em><br />For Every Moment</h2>
        </div>
        <button className="btn-outline" style={{whiteSpace:'nowrap',flexShrink:0}}>View All Bouquets</button>
      </div>
      <div className="collection-grid">
        {BOUQUETS.map(b => (
          <div key={b.name} className="card">
            {b.badge && <div className="card-badge">{b.badge}</div>}
            <div className="card-img-shell">
              <img className="card-img"
                src={`https://images.unsplash.com/${b.photo}?auto=format&fit=crop&q=80&w=600`}
                alt={b.name} />
            </div>
            <div className="card-body">
              <div className="card-tag">{b.tag}</div>
              <div className="card-name">{b.name}</div>
              <div className="card-desc">{b.desc}</div>
              <div className="card-foot">
                <div className="card-price">{b.price}</div>
                <button className="btn-card">Add to Cart</button>
              </div>
            </div>
          </div>
        ))}
      </div>
    </section>
  );
}
